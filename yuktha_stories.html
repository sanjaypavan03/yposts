<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yuktha — 100 Instagram Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#02B69A;--teal2:#00D4AA;--ink:#020810;--ink2:#060F1C;--slate:#8FA3B8;--slate2:#C2D4E4;--white:#F0F8FF;--red:#E84040;--amber:#F0A020;--purple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'DM Sans',sans-serif;padding:20px}
.header{max-width:1400px;margin:0 auto 20px}
h1{color:#fff;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:500;margin-bottom:4px}
h1 span{color:var(--teal)}
.meta{color:#444;font-size:12px;margin-bottom:16px}
.phases{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ph{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.ph.a{background:var(--teal);color:#000;border-color:var(--teal)}
.ph:not(.a){background:#1a1a1a;color:#555;border-color:#222}
.ph:hover:not(.a){background:#222;color:#888}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;max-width:1400px;margin:0 auto}
.card{display:flex;flex-direction:column;gap:6px}
.card-top{display:flex;align-items:center;gap:7px}
.dn{font-family:'DM Mono',monospace;font-size:10px;color:#333}
.pp{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:6px}
.pp1{background:rgba(232,64,64,.15);color:#E84040}
.pp2{background:rgba(139,92,246,.15);color:#A78BFA}
.pp3{background:rgba(2,182,154,.15);color:#02B69A}
/* Story box — 9:16 ratio */
.story{width:100%;aspect-ratio:9/16;border-radius:12px;overflow:hidden;position:relative;cursor:pointer}
.cap{background:#141414;border-radius:6px;padding:8px 10px;font-size:10px;color:#555;line-height:1.5;max-height:60px;overflow:hidden}
.cb{background:var(--teal);color:#000;border:none;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;padding:5px;border-radius:6px;cursor:pointer;width:100%}
.cb:hover{background:var(--teal2)}
.cb.done{background:#1a3a2a;color:var(--teal)}
/* ── STORY INNER ── */
.s{width:100%;height:100%;display:flex;flex-direction:column;padding:20px 16px;position:relative;overflow:hidden;background:var(--ink)}
.gc{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none}
/* Story UI chrome */
.story-top{display:flex;align-items:center;gap:8px;margin-bottom:auto;position:relative;z-index:2}
.progress{flex:1;height:2px;background:rgba(255,255,255,.2);border-radius:2px}
.progress-fill{height:100%;border-radius:2px;background:#fff;width:60%}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(2,182,154,.2);border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar-text{font-family:'Playfair Display',serif;font-size:9px;font-weight:900;font-style:italic;color:var(--teal)}
.handle{font-size:10px;font-weight:600;color:#fff;flex:1}
.time-ago{font-size:9px;color:rgba(255,255,255,.4)}
/* Story body */
.story-body{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:8px;position:relative;z-index:2}
/* Story types */
.big-text{font-size:clamp(20px,5vw,28px);font-weight:700;color:#fff;line-height:1.25;margin-bottom:8px}
.big-text .r{color:var(--red)}
.big-text .t{color:var(--teal)}
.big-text .a{color:var(--amber)}
.big-text .p{color:var(--purple)}
.sub-text{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:10px}
.story-tag{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.st{color:var(--teal)}.sr{color:var(--red)}.sa{color:var(--amber)}.sp{color:var(--purple)}
/* Poll widget */
.poll{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.poll-opt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 12px;font-size:11px;color:#fff;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.poll-opt .bar{position:absolute;left:0;top:0;bottom:0;background:rgba(2,182,154,.2);border-radius:8px;z-index:-1}
.poll-opt-wrap{position:relative;overflow:hidden;border-radius:8px}
.poll-label{background:rgba(2,182,154,.15);border:1px solid rgba(2,182,154,.3);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--teal);font-weight:600;text-align:center}
/* Question sticker */
.q-sticker{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:12px;padding:12px;margin-top:8px}
.q-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:4px}
.q-text{font-size:12px;color:#fff;font-weight:600;line-height:1.4}
/* Countdown */
.countdown-wrap{background:rgba(2,182,154,.1);border:1px solid rgba(2,182,154,.25);border-radius:12px;padding:12px;text-align:center;margin-top:8px}
.cd-num{font-family:'DM Mono',monospace;font-size:36px;font-weight:700;color:var(--teal);line-height:1}
.cd-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
/* Swipe up */
.swipe-up{text-align:center;margin-top:10px}
.swipe-arrow{font-size:9px;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:2px}
.swipe-arrow svg{animation:bob 1.5s ease infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
/* Reaction row */
.react-row{display:flex;gap:8px;margin-top:8px}
.react{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;text-align:center;font-size:18px}
/* Stat card */
.stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center;margin-top:8px}
.stat-n{font-family:'DM Mono',monospace;font-size:36px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-l{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.06em}
/* CTA button */
.s-btn{background:var(--teal);color:#000;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;text-align:center;margin-top:8px}
.s-btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);border-radius:10px;padding:9px 16px;font-size:12px;font-weight:700;text-align:center;margin-top:6px}
/* Quote */
.quote-box{background:rgba(255,255,255,.04);border-left:3px solid var(--teal);border-radius:0 10px 10px 0;padding:12px;margin-top:8px}
.qt{font-size:11px;color:rgba(255,255,255,.7);font-style:italic;line-height:1.6}
/* Divider */
.div-line{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
/* Logo */
.yl{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;font-style:italic;color:var(--teal);display:flex;align-items:center;gap:3px}
.yl .d{width:5px;height:5px;border-radius:50%;background:var(--teal2);margin-bottom:1px}
</style>
</head>
<body>
<div class="header">
  <h1>yuktha<span>•</span> — 100 Instagram Stories</h1>
  <p class="meta">One story per day to go with each feed post · Right-click to save · Click Copy Caption to copy</p>
  <div class="phases">
    <button class="ph a" onclick="fp('all',this)">All 100</button>
    <button class="ph" onclick="fp('1',this)">Phase 1 — Problem (1–30)</button>
    <button class="ph" onclick="fp('2',this)">Phase 2 — Tease (31–60)</button>
    <button class="ph" onclick="fp('3',this)">Phase 3 — Launch (61–100)</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<script>
function chrome(day){return`<div class="story-top"><div class="progress"><div class="progress-fill"></div></div><div class="avatar"><div class="avatar-text">y</div></div><span class="handle">yuktha</span><span class="time-ago">now</span></div>`}

const S=[
// ── PHASE 1 — PROBLEM (1-30) ──────────────────────────────────────────────
{d:1,ph:'1',cap:`Swipe up link in bio · #Yuktha`,v:`<div class="s"><div class="gc" style="width:250px;height:250px;background:rgba(232,64,64,.15);top:-80px;right:-80px"></div>${chrome(1)}<div class="story-body"><div class="story-tag sr">DAY 01</div><div class="big-text">Can you answer these <span class="r">3 questions</span> right now?</div><div class="poll"><div class="poll-label">What's your blood group?</div><div class="poll-label" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4)">What are you allergic to?</div><div class="poll-label" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4)">What medications are you on?</div></div><div class="sub-text" style="margin-top:8px">Without checking your phone.</div></div></div>`},

{d:2,ph:'1',cap:`Follow for more · #GoldenHour #Yuktha`,v:`<div class="s"><div class="gc" style="width:300px;height:300px;background:rgba(232,64,64,.12);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(2)}<div class="story-body"><div class="story-tag sr">THE GOLDEN HOUR</div><div class="stat-card"><div class="stat-n" style="color:var(--red);font-size:72px">60</div><div class="stat-l">minutes to save a life</div></div><div class="big-text" style="margin-top:12px;font-size:16px">After that — the odds change forever.</div><div class="sub-text">Most people have never thought about this. You're thinking about it now.</div></div></div>`},

{d:3,ph:'1',cap:`Comment your answer below · #Yuktha`,v:`<div class="s"><div class="gc" style="width:260px;height:260px;background:rgba(2,182,154,.09);bottom:0;left:50%;transform:translateX(-50%)"></div>${chrome(3)}<div class="story-body"><div class="story-tag st">QUICK POLL</div><div class="big-text" style="font-size:18px;margin-bottom:12px">If you collapsed right now — could a doctor find your emergency info?</div><div class="poll"><div class="poll-opt-wrap"><div class="poll-opt">✅ Yes — it's all accessible<div class="bar" style="width:12%"></div></div></div><div class="poll-opt-wrap"><div class="poll-opt">❌ No — it's scattered<div class="bar" style="width:71%"></div></div></div><div class="poll-opt-wrap"><div class="poll-opt">😶 Never thought about it<div class="bar" style="width:17%"></div></div></div></div></div></div>`},

{d:4,ph:'1',cap:`Tag someone who needs to see this · #India #Healthcare`,v:`<div class="s"><div class="gc" style="width:280px;height:280px;background:rgba(232,64,64,.12);top:20%;right:-80px"></div>${chrome(4)}<div class="story-body"><div class="story-tag sr">THIS IS REAL</div><div class="big-text" style="font-size:17px;margin-bottom:10px">This WhatsApp conversation is happening in hospital corridors across India. Right now. Tonight.</div><div class="quote-box"><div class="qt">"What's Dad's blood group?"<br>"I don't know"<br>"Mama is in the operation theatre"<br>"..."</div></div><div class="sub-text" style="margin-top:8px">Don't be this family.</div></div></div>`},

{d:5,ph:'1',cap:`Share this story with one person · #Yuktha`,v:`<div class="s"><div class="gc" style="width:300px;height:300px;background:rgba(232,64,64,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div>${chrome(5)}<div class="story-body"><div class="story-tag sr">THINK ABOUT THIS</div><div class="big-text" style="font-size:22px;line-height:1.3;margin-bottom:12px">Your phone is locked.<br><br>The doctor at 3AM <span class="r">can't get in.</span></div><div class="sub-text">The most important information about you is hidden behind a password from the one person who needs it most.</div></div></div>`},

{d:6,ph:'1',cap:`Something is being built to fix this · #India`,v:`<div class="s"><div class="gc" style="width:260px;height:260px;background:rgba(240,160,32,.08);bottom:10%;left:-60px"></div>${chrome(6)}<div class="story-body"><div class="story-tag sa">THE REALITY</div><div class="big-text" style="font-size:20px;margin-bottom:14px">How 60,000 Indian hospitals manage your health records:</div><div style="display:flex;flex-direction:column;gap:6px"><div class="poll-label" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">📋 Paper registers</div><div class="poll-label" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">📱 WhatsApp screenshots</div><div class="poll-label" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">🧠 Memory</div></div><div class="sub-text" style="margin-top:10px">This is your healthcare infrastructure.</div></div></div>`},

{d:7,ph:'1',cap:`Day 7 of building in public · Follow the journey · #BuildingInPublic`,v:`<div class="s"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.09);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(7)}<div class="story-body"><div class="story-tag st">DAY 7 — BUILDING IN PUBLIC</div><div class="big-text" style="font-size:20px;margin-bottom:12px">3rd year engineering student.<br><br>Found a problem.<br><br><span class="t">Couldn't stop thinking about it.</span></div><div class="sub-text">So I started building something. Follow the journey.</div><div class="s-btn-outline" style="margin-top:10px">Follow @yuktha 🩺</div></div></div>`},

{d:8,ph:'1',cap:`Tag someone who's been to a private hospital · #Healthcare #India`,v:`<div class="s"><div class="gc" style="width:260px;height:260px;background:rgba(240,160,32,.08);top:20%;right:-60px"></div>${chrome(8)}<div class="story-body"><div class="story-tag sa">EVERY. SINGLE. TIME.</div><div class="big-text" style="font-size:20px;margin-bottom:10px">You've filled this form before.</div><div class="quote-box" style="border-left-color:var(--amber)"><div class="qt" style="color:rgba(255,255,255,.6)">Name. Age. Address. Complaint.<br>Same form. Same hospital.<br>Third time this year.<br><br>Because nobody connected the records.</div></div><div class="sub-text" style="margin-top:8px">Every hospital. Blank slate. Every time.</div></div></div>`},

{d:9,ph:'1',cap:`Follow @yuktha for more · #Yuktha #Healthcare`,v:`<div class="s"><div class="gc" style="width:280px;height:280px;background:rgba(139,92,246,.09);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(9)}<div class="story-body"><div class="story-tag sp">CO-FOUNDER</div><div class="big-text" style="font-size:18px;margin-bottom:10px">She's a doctor.</div><div class="quote-box" style="border-left-color:var(--purple)"><div class="qt">"I watched a patient go into shock because nobody knew about an allergy sitting in a file at another hospital.<br><br>The information existed. It just wasn't there."</div></div><div class="sub-text" style="margin-top:8px">Dr. Naga Keerthana — MBBS, Co-Founder</div></div></div>`},

{d:10,ph:'1',cap:`Tag someone this is true for · #MedicalRecords`,v:`<div class="s"><div class="gc" style="width:260px;height:260px;background:rgba(232,64,64,.1);bottom:10%;right:-60px"></div>${chrome(10)}<div class="story-body"><div class="story-tag sr">WHERE YOUR RECORDS ARE</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px"><div class="poll-label" style="background:rgba(232,64,64,.08);border-color:rgba(232,64,64,.2);color:rgba(255,255,255,.7);text-align:left;font-weight:400;font-size:11px">Clinic A — your 2019 diagnosis 📁</div><div class="poll-label" style="background:rgba(232,64,64,.08);border-color:rgba(232,64,64,.2);color:rgba(255,255,255,.7);text-align:left;font-weight:400;font-size:11px">Hospital B — your 2021 surgery 📁</div><div class="poll-label" style="background:rgba(232,64,64,.08);border-color:rgba(232,64,64,.2);color:rgba(255,255,255,.7);text-align:left;font-weight:400;font-size:11px">Lab C — your last blood report 📁</div></div><div class="big-text" style="font-size:20px;color:var(--red)">Nobody has the complete picture.</div><div class="sub-text">Not even you.</div></div></div>`},

{d:11,ph:'1',cap:`Something is being built · Follow to find out what · #Yuktha`,v:`<div class="s"><div class="gc" style="width:300px;height:300px;background:rgba(232,64,64,.12);top:50%;left:50%;transform:translate(-50%,-50%)"></div>${chrome(11)}<div class="story-body"><div class="story-tag sr">INDIA STAT</div><div class="stat-card"><div class="stat-n" style="color:var(--red)">3%</div><div class="stat-l">of Indians have digital health records</div></div><div class="big-text" style="font-size:18px;margin-top:12px">In a country of<br><span class="t">1.4 billion people.</span></div><div class="sub-text" style="margin-top:6px">This is not acceptable. Something is being built to change it.</div></div></div>`},

{d:12,ph:'1',cap:`Something is coming · Stay close · #Yuktha`,v:`<div class="s"><div class="gc" style="width:260px;height:260px;background:rgba(139,92,246,.07);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(12)}<div class="story-body"><div class="story-tag sp">YOUR DOCTOR HAS</div><div class="stat-card" style="background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.2)"><div class="stat-n" style="color:var(--purple)">3</div><div class="stat-l">minutes per patient</div></div><div class="big-text" style="font-size:16px;margin-top:12px">In those 3 minutes:<br>Check history · Check allergies · Review last Rx · Make a new decision.</div><div class="sub-text" style="margin-top:6px">From a paper file. From memory. We can do better.</div></div></div>`},

{d:13,ph:'1',cap:`Drop a 🔴 if this hit · #Yuktha`,v:`<div class="s"><div class="gc" style="width:280px;height:280px;background:rgba(139,92,246,.08);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(13)}<div class="story-body"><div class="story-tag sp">TONIGHT</div><div class="big-text" style="font-size:18px;line-height:1.5;margin-bottom:12px">Right now somewhere in India a doctor is treating a patient with no information.</div><div class="quote-box" style="border-left-color:var(--purple)"><div class="qt">No history.<br>No allergies.<br>No medications.<br><br>Treating blindly.</div></div><div class="sub-text" style="margin-top:8px">This is the problem we can't stop thinking about.</div></div></div>`},

{d:14,ph:'1',cap:`Drop a 🔴 if you're following this journey · #BuildingInPublic`,v:`<div class="s"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.1);top:30%;left:50%;transform:translateX(-50%)"></div>${chrome(14)}<div class="story-body"><div class="story-tag st">2 WEEKS IN</div><div class="stat-card"><div class="stat-n">14</div><div class="stat-l">days of talking about this problem</div></div><div class="big-text" style="font-size:18px;margin-top:12px">You're still here.</div><div class="sub-text" style="margin-top:6px">That means something.<br>Phase 2 coming soon. Drop a 🔴 if you've been following.</div></div></div>`},

function fp(p,btn){
  document.querySelectorAll('.ph').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');
  render(p);
}

function render(ph){
  const g=document.getElementById('grid');
  g.innerHTML='';
  const list=ph==='all'?S:S.filter(s=>s.ph===ph);
  const labels={1:'🔴 P1',2:'💜 P2',3:'🟢 P3'};
  list.forEach(s=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`
      <div class="card-top">
        <span class="dn">Day ${String(s.d).padStart(2,'0')}</span>
        <span class="pp pp${s.ph}">${labels[s.ph]}</span>
      </div>
      <div class="story">${s.v}</div>
      <div class="cap">${s.cap.replace(/\n/g,'<br>')}</div>
      <button class="cb" id="sb-${s.d}" onclick="cc(${s.d})">Copy Caption</button>
    `;
    g.appendChild(d);
  });
}

function cc(d){
  const s=S.find(x=>x.d===d);
  navigator.clipboard.writeText(s.cap).then(()=>{
    const b=document.getElementById('sb-'+d);
    b.textContent='Copied ✓';b.classList.add('done');
    setTimeout(()=>{b.textContent='Copy Caption';b.classList.remove('done');},2000);
  });
}

render('all');
</script>
