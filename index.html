{d:61,ph:'3',cap:`We're launching.\n\nNot someday. Not when it's perfect.\n\nNow.\n\nBecause people are in hospitals right now with no information.\n\nAnd we have the thing that fixes it.\n\nWaitlist link in bio. Be among the first.\n\n#Yuktha #Launch`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.12);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 61</div></div><div class="body" style="text-align:center;justify-content:center"><div class="tag tc" style="text-align:center;margin-bottom:16px">PHASE 3</div><div style="font-size:36px;font-weight:700;color:#fff;margin-bottom:8px">We're launching.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:12px;color:var(--slate);line-height:1.7">Not someday. Not when it's perfect.<br>Now.<br>Because people are in hospitals right now<br>with no information.<br><span style="color:var(--teal);font-weight:600">And we have the thing that fixes it.</span></div></div></div>`},

{d:62,ph:'3',cap:`The waitlist is open.\n\nDon't be the person who saw this on Day 1 and signed up on Day 100.\n\nLink in bio. Join today.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 62</div></div><div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:14px">Don't be the person who saw this on Day 1 and signed up on Day 100.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="background:var(--teal);color:#000;font-size:13px;font-weight:700;padding:12px 24px;border-radius:10px;display:inline-block">Join the waitlist →</div></div></div>`},

{d:63,ph:'3',cap:`First hospital went live on Yuktha this week.\n\nPaper to digital.\nIn 48 hours.\nIn Telangana.\n\nThis is just the beginning.\n\nIf you own or manage a hospital — DM us.\n\n#Yuktha #HospitalOS`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 63</div></div><div class="body" style="margin-top:14px"><div class="tag tc">FIRST HOSPITAL. LIVE.</div><div style="text-align:center;margin:16px 0"><div style="font-size:48px;margin-bottom:8px">🏥</div><div class="h2" style="margin-bottom:4px">Paper to digital.</div><div style="font-size:13px;color:var(--teal);margin-bottom:4px">48 hours.</div><div style="font-size:11px;color:var(--slate)">Telangana.</div></div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:12px;color:var(--slate2);text-align:center">This is just the beginning.<br>Hospital owner? DM us.</div></div></div>`},

{d:64,ph:'3',cap:`A patient set up their Emergency QR last week.\n\nTheir daughter shared it with me.\n\n"My father had a cardiac event on the highway. The paramedic scanned the QR. Blood group B+. No penicillin. On metformin. Three seconds. He's okay."\n\nThis is why we built it.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 64</div></div><div class="body" style="margin-top:14px"><div class="tag tc">WHY WE BUILT IT</div><div class="boxt" style="margin-bottom:12px"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:6px">MESSAGE FROM A PATIENT'S DAUGHTER</div><div style="font-size:11px;color:var(--slate2);font-style:italic;line-height:1.7">"My father had a cardiac event on the highway. The paramedic scanned the QR. Blood group B+. No penicillin. On metformin. Three seconds. He's okay."</div></div><div style="font-size:13px;font-weight:700;color:var(--teal)">This is why we built it.</div></div></div>`},

{d:65,ph:'3',cap:`60,000 hospitals.\n500 million patients.\n₹28,000 crore market.\n\nWe don't need 1% of this to build something that matters.\n\nWe need 150 hospitals who believe in it.\n\nAre you one of them?\n\nDM us. #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 65</div></div><div style="text-align:center"><div class="tag tc" style="text-align:center;margin-bottom:14px">THE MARKET</div><div style="font-family:'DM Mono',monospace;font-size:44px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:4px">₹28K Cr</div><div style="font-size:11px;color:var(--slate);margin-bottom:14px">Hospital management market by 2030</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:12px;color:var(--slate2)">We don't need 1% of this.<br>We need <span style="color:#fff;font-weight:700">150 hospitals</span><br>who believe in it.</div></div></div>`},

{d:66,ph:'3',cap:`This is what we say to people who tell us Practo already does this:\n\nPracto books appointments.\nABHA barely works.\nHMS software manages billing.\n\nNone of them answer:\nWhat happens when an unconscious patient arrives at a hospital that has never seen them before?\n\nWe built the answer.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 66</div></div><div class="body" style="margin-top:14px"><div class="tag tr">THE QUESTION NOBODY ANSWERED</div><div style="margin:12px 0;padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:#fff;line-height:1.7;font-style:italic">"What happens when an unconscious patient arrives at a hospital that has never seen them before?"</div></div><div style="font-size:11px;color:var(--slate);margin-bottom:10px">Practo doesn't answer it.<br>ABHA doesn't answer it.<br>HMS software doesn't answer it.</div><div style="font-size:13px;font-weight:700;color:var(--teal)">Yuktha built the answer.</div></div></div>`},

{d:67,ph:'3',cap:`You watched us build this from Day 1.\n\nNow we're asking — do you know someone who should be using Yuktha?\n\nA hospital owner.\nA doctor.\nA patient with a chronic condition.\nA family with elderly parents.\n\nShare this with them. Today. 👇\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 67</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:14px">You watched us build this.<br>Now share it.</div><div style="font-size:11px;color:var(--slate);line-height:2;margin-bottom:12px">A hospital owner.<br>A doctor.<br>A patient with a chronic condition.<br>A family with elderly parents.</div><div style="font-size:12px;color:var(--teal);font-weight:600">They need to know this exists. 👇</div></div></div>`},

{d:68,ph:'3',cap:`Nobody tells you that building a healthcare platform means becoming a part-time doctor, part-time lawyer, part-time salesperson — while finishing your engineering degree.\n\nWith zero salary.\nZero guarantee.\n\nThe problem is worth it.\n\nDay 68. #StartupLife #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 68</div></div><div class="body" style="margin-top:14px"><div class="tag tp">THE HONEST VERSION</div><div style="padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06);margin:10px 0"><div style="font-size:12px;color:var(--slate2);line-height:1.8">Nobody tells you that building a healthcare platform means becoming a part-time doctor, part-time lawyer, part-time salesperson — while finishing your engineering degree.<br><br>With zero salary. Zero guarantee.</div></div><div style="height:2px;width:36px;background:var(--teal);margin-bottom:10px"></div><div style="font-size:14px;font-weight:700;color:var(--teal)">The problem is worth it.</div></div></div>`},

{d:69,ph:'3',cap:`We have you have travel insurance. Car insurance. Health insurance.\n\nBut you don't have your Emergency QR set up.\n\nThe one thing that works when everything else fails.\n\nLink in bio. 3 minutes.\n\n#Yuktha #EmergencyQR`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 69</div></div><div class="body" style="margin-top:14px"><div class="tag ta">THE MISSING ONE</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px"><div class="boxn" style="display:flex;align-items:center;gap:8px;opacity:.5"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Travel insurance</span></div><div class="boxn" style="display:flex;align-items:center;gap:8px;opacity:.5"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Car insurance</span></div><div class="boxn" style="display:flex;align-items:center;gap:8px;opacity:.5"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Health insurance</span></div><div class="boxa" style="display:flex;align-items:center;gap:8px"><span>⚠️</span><span style="font-size:11px;color:var(--amber)">Emergency QR — NOT SET UP</span></div></div><div style="font-size:11px;color:var(--teal)">3 minutes. Link in bio. Do it now.</div></div></div>`},

{d:70,ph:'3',cap:`70 days ago we had an idea.\n\nToday we have:\n• Hospitals on the platform\n• VCs in conversation\n• Patients with their Emergency QR active\n• A product that actually works\n\nYou watched this happen.\n\n#Yuktha #Day70 #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 70</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">70</div><div style="font-size:13px;color:#fff;margin-bottom:12px">days ago we had an idea.</div><div style="display:flex;flex-direction:column;gap:5px;text-align:left;max-width:220px;margin:0 auto 12px"><div class="li"><div class="ld"></div><div class="lt">Hospitals on the platform</div></div><div class="li"><div class="ld"></div><div class="lt">VCs in conversation</div></div><div class="li"><div class="ld"></div><div class="lt">Emergency QRs active</div></div><div class="li"><div class="ld"></div><div class="lt">Product that actually works</div></div></div><div style="font-size:11px;color:var(--slate)">You watched this happen.</div></div></div>`},

{d:71,ph:'3',cap:`Poll: Do you know your blood group right now — without checking your phone?\n\nDrop your answer below 👇\n\nA+ / A- / B+ / B- / O+ / O- / AB+ / AB-\n\n#BloodGroup #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 71</div></div><div style="text-align:center"><div class="tag tc" style="text-align:center;margin-bottom:14px">QUICK POLL</div><div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:14px">Do you know your blood group right now?</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:200px;margin:0 auto"><div class="boxt" style="font-size:11px;font-weight:700;color:var(--teal);text-align:center">A+</div><div class="boxt" style="font-size:11px;font-weight:700;color:var(--teal);text-align:center">B+</div><div class="boxt" style="font-size:11px;font-weight:700;color:var(--teal);text-align:center">O+</div><div class="boxt" style="font-size:11px;font-weight:700;color:var(--teal);text-align:center">AB+</div></div><div style="margin-top:12px;font-size:11px;color:var(--slate)">Drop your blood group below 👇</div></div></div>`},

{d:72,ph:'3',cap:`Myth: "I'm young and healthy. I don't need this."\n\nFact: The golden hour doesn't check your age or health status before it starts.\n\nSet up your Emergency QR. It takes 3 minutes. Link in bio.\n\n#Yuktha #MythVsFact`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 72</div></div><div class="body" style="margin-top:14px"><div class="tag tr">MYTH VS FACT</div><div style="display:flex;flex-direction:column;gap:10px;margin-top:10px"><div class="boxr"><div style="font-size:10px;color:var(--red);font-weight:700;margin-bottom:4px">🚫 MYTH</div><div style="font-size:12px;color:var(--slate2)">I'm young and healthy.<br>I don't need this.</div></div><div class="boxt"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:4px">✓ FACT</div><div style="font-size:12px;color:var(--slate2)">The golden hour doesn't check your age or health status before it starts.<br><br>Accidents happen to everyone.</div></div></div></div></div>`},

{d:73,ph:'3',cap:`What I wish I knew before building Yuktha:\n\n• The problem is 10x bigger than you think\n• Hospital owners want to go digital — they just haven't been given the right tool\n• Your co-founder being a doctor is the single most important decision you'll make\n• Building in public isn't just marketing — it's accountability\n\nDay 73. #Founder #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 73</div></div><div class="body" style="margin-top:14px"><div class="tag tp">WHAT I WISH I KNEW</div><div style="display:flex;flex-direction:column;gap:7px;margin-top:10px"><div class="bl"><div style="font-size:11px;color:var(--slate2)">The problem is 10x bigger than you think</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2)">Hospital owners want to go digital — they need the right tool</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2)">A doctor co-founder is the most important decision</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2)">Building in public is accountability, not just marketing</div></div></div></div></div>`},

{d:74,ph:'3',cap:`There's a version of India where every patient who collapses on the street has their blood group, allergies, and medications instantly accessible to any doctor.\n\nThat version of India is being built right now.\n\nBy us.\n\nLink in bio. Join the waitlist.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 74</div></div><div style="text-align:center"><div style="font-size:13px;color:var(--slate2);line-height:2;margin-bottom:14px">There's a version of India<br>where every patient who collapses<br>has their blood group,<br>allergies, and medications<br>instantly accessible to any doctor.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:14px;font-weight:700;color:var(--teal)">That version is being built.</div><div style="font-size:12px;color:var(--slate);margin-top:4px">By us. Right now.</div></div></div>`},

{d:75,ph:'3',cap:`Day 75.\n\nThree-quarters through.\n\nThe problem that started this journey hasn't changed.\n\nThe urgency hasn't changed.\n\nBut what we've built has changed everything.\n\nStay with us. The best is still ahead.\n\n#Yuktha #Day75 #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 75</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">75</div><div style="font-size:13px;color:#fff;margin-bottom:10px">Three-quarters through.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:11px;color:var(--slate);line-height:1.7">Same problem. Same urgency.<br>But what we've built has changed everything.<br><span style="color:var(--teal);font-weight:600">The best is still ahead.</span></div></div></div>`},

{d:76,ph:'3',cap:`You have health insurance for things that might happen.\n\nBut no system for the thing that WILL happen — a moment when a doctor needs to know your blood group, allergies, and medications instantly.\n\nThat moment is coming for all of us.\n\nYuktha. 3 minutes. Link in bio.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 76</div></div><div class="body" style="margin-top:14px"><div class="tag ta">THE THING THAT WILL HAPPEN</div><div class="h3" style="margin-bottom:12px">You have insurance for things that MIGHT happen.</div><div class="boxa" style="margin-bottom:12px"><div style="font-size:12px;color:var(--amber);line-height:1.7">But no system for the moment that WILL come — when a doctor needs your blood group, allergies, and medications instantly.</div></div><div style="height:2px;width:36px;background:var(--teal);margin-bottom:10px"></div><div style="font-size:12px;color:var(--teal);font-weight:600">That moment is coming for all of us.<br>Be ready.</div></div></div>`},

{d:77,ph:'3',cap:`We walked into rooms with investors and said:\n\n"We're building the infrastructure layer of Indian healthcare."\n\nEvery single one of them leaned forward.\n\nBecause nobody has built this yet.\n\nWe're building it.\n\n#Yuktha #HealthTech`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 77</div></div><div class="body" style="margin-top:14px"><div class="tag tp">THE PITCH</div><div class="h3" style="margin-bottom:12px">We said:</div><div style="padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06);margin-bottom:12px"><div style="font-size:13px;color:#fff;font-style:italic;line-height:1.7">"We're building the infrastructure layer of Indian healthcare."</div></div><div class="boxt"><div style="font-size:11px;color:var(--teal)">Every single investor leaned forward.<br>Because nobody has built this yet.</div></div></div></div>`},

{d:78,ph:'3',cap:`3 things we built that nobody asked for:\n\n1. Emergency QR that works offline — because WiFi doesn't come with emergencies\n2. AI reports in 22 languages — because India doesn't speak one language\n3. A hospital system that costs what one consultation day earns — because price shouldn't be the barrier\n\nNobody asked. We built anyway. #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 78</div></div><div class="body" style="margin-top:14px"><div class="tag tc">3 THINGS NOBODY ASKED FOR</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:10px"><div class="boxt"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:4px">01</div><div style="font-size:11px;color:var(--slate2)">Emergency QR works offline — WiFi doesn't come with emergencies</div></div><div class="boxt"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:4px">02</div><div style="font-size:11px;color:var(--slate2)">AI reports in 22 languages — India doesn't speak one language</div></div><div class="boxt"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:4px">03</div><div style="font-size:11px;color:var(--slate2)">Hospital system priced at one consultation day — price shouldn't be the barrier</div></div></div></div></div>`},

{d:79,ph:'3',cap:`The people who set up their Emergency QR today will never know if it saved their life.\n\nThat's the point.\n\nBut the doctor who scans it at the right moment will know.\n\nAnd so will the family who doesn't have to wonder.\n\nLink in bio. 3 minutes.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 79</div></div><div style="text-align:center"><div style="font-size:13px;color:var(--slate2);line-height:2;margin-bottom:14px">The people who set up their QR today will never know if it saved their life.<br><span style="color:var(--teal);font-weight:600">That's the point.</span></div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:11px;color:var(--slate)">But the doctor who scans it will know.<br>And the family won't have to wonder.</div></div></div>`},

{d:80,ph:'3',cap:`80 days. 80 posts.\n\nIf you've been here since Day 1 — you watched something get built from nothing.\n\nThat's not nothing.\n\nThank you. The journey continues.\n\n#Yuktha #Day80 #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 80</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">80</div><div style="font-size:13px;color:#fff;margin-bottom:10px">days. 80 posts.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:12px;color:var(--slate);line-height:1.7">If you've been here since Day 1 —<br>you watched something get built from nothing.<br><span style="color:var(--teal);font-weight:600">That's not nothing.</span></div></div></div>`},

{d:81,ph:'3',cap:`"Why didn't this exist before?"\n\nWe get asked this every time we demo Yuktha.\n\nHonestly? We don't know.\n\nBut it exists now.\n\nLink in bio.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(139,92,246,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 81</div></div><div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:14px">"Why didn't this exist before?"</div><div style="font-size:12px;color:var(--slate);margin-bottom:12px">We get asked this every time we demo Yuktha.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:13px;font-weight:700;color:var(--teal)">Honestly? We don't know.<br>But it exists now.</div></div></div>`},

{d:82,ph:'3',cap:`2 months in. Here's what building Yuktha actually looked like:\n\n• Coded through the night more times than I can count\n• Got rejected by people who should have believed earlier\n• Talked to 50+ hospital owners\n• Shipped features nobody noticed\n• Kept going anyway\n\nDay 82. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 82</div></div><div class="body" style="margin-top:14px"><div class="tag tc">WHAT IT ACTUALLY LOOKED LIKE</div><div style="display:flex;flex-direction:column;gap:7px;margin-top:10px"><div class="li"><div class="ld"></div><div class="lt">Coded through the night — too many times to count</div></div><div class="li"><div class="ld"></div><div class="lt">Got rejected by people who should have believed earlier</div></div><div class="li"><div class="ld"></div><div class="lt">Talked to 50+ hospital owners</div></div><div class="li"><div class="ld"></div><div class="lt">Shipped features nobody noticed</div></div><div class="li"><div class="ld" style="background:var(--teal)"></div><div class="lt" style="color:var(--teal);font-weight:600">Kept going anyway</div></div></div></div></div>`},

{d:83,ph:'3',cap:`The Emergency QR works best when you never need it.\n\nBut when you do need it — nothing else works as fast.\n\nSet it up. Not for you. For the doctor who might be treating you at 3AM when you can't speak.\n\nLink in bio. 3 minutes.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 83</div></div><div style="text-align:center"><div style="font-size:13px;color:var(--slate2);line-height:2;margin-bottom:14px">The Emergency QR works best<br>when you never need it.<br><br>But when you do —<br><span style="color:var(--teal);font-weight:600">nothing else works as fast.</span></div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:11px;color:var(--slate)">Set it up for the doctor treating you at 3AM.<br>When you can't speak.</div></div></div>`},

{d:84,ph:'3',cap:`Someone asked us yesterday: "What does success look like for Yuktha?"\n\nNot the revenue.\nNot the hospitals.\n\nSuccess looks like a doctor scanning a QR and knowing exactly what to do.\nIn time.\n\nThat's it.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 84</div></div><div class="body" style="margin-top:14px"><div class="tag tc">WHAT SUCCESS LOOKS LIKE</div><div style="margin:14px 0;padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)"><div style="font-size:12px;color:var(--slate2);line-height:1.8">Not the revenue.<br>Not the number of hospitals.<br><br>Success looks like a doctor scanning a QR and knowing exactly what to do.<br><br><span style="color:var(--teal);font-weight:600">In time.</span></div></div><div style="font-size:12px;color:var(--slate)">That's the only metric that matters.</div></div></div>`},

{d:85,ph:'3',cap:`We're 15 days from Day 100.\n\nThis journey started with a problem.\n\nIt's ending with a product, hospitals on the platform, and a mission that hasn't changed for a single second.\n\nStay with us for the final 15 days.\n\n#Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 85</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">15</div><div style="font-size:14px;color:#fff;margin-bottom:10px">days until Day 100.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:11px;color:var(--slate);line-height:1.7">Started with a problem.<br>Ending with a product.<br>Mission unchanged.<br><span style="color:var(--teal);font-weight:600">Stay for the final 15.</span></div></div></div>`},

{d:86,ph:'3',cap:`If you're a hospital owner in Telangana, Maharashtra, or Andhra Pradesh —\n\nThis is your sign.\n\nDM us. Free pilot. No commitment. Just show us your hospital and let Yuktha show you what's possible.\n\nLink in bio.\n\n#Yuktha #HospitalOS`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 86</div></div><div class="body" style="margin-top:14px"><div class="tag tc">HOSPITAL OWNERS — THIS IS YOUR SIGN</div><div class="h3" style="margin-bottom:12px">Telangana.<br>Maharashtra.<br>Andhra Pradesh.</div><div class="boxt" style="margin-bottom:12px"><div style="font-size:11px;color:var(--teal);line-height:1.7">Free pilot.<br>No commitment.<br>Just show us your hospital and let Yuktha show you what's possible.</div></div><div style="font-size:12px;color:#fff;font-weight:600">DM us. Today. 👇</div></div></div>`},

{d:87,ph:'3',cap:`The one question we get asked the most:\n\n"How does the Emergency QR work if there's no internet?"\n\nThe data isn't just stored online.\n\nIt's embedded in the QR code itself. Blood group, allergies, medications — encoded directly. Any camera. Any emergency. Always.\n\n#Yuktha #EmergencyQR`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 87</div></div><div class="body" style="margin-top:14px"><div class="tag tc">MOST ASKED QUESTION</div><div style="margin:10px 0;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)"><div style="font-size:12px;color:var(--slate2);font-style:italic">"How does the QR work without internet?"</div></div><div class="boxt"><div style="font-size:11px;color:var(--teal);line-height:1.7">The data isn't just stored online.<br>It's embedded IN the QR code itself.<br>Blood group, allergies, medications —<br>encoded directly.<br>Any camera. Any emergency. Always.</div></div></div></div>`},

{d:88,ph:'3',cap:`Here's the thing about building something that could save lives:\n\nYou can't half-do it.\n\nEvery bug is someone's emergency.\nEvery missing feature is someone's information gap.\nEvery delay is someone's 60 minutes.\n\nThis is why we don't sleep much.\n\nDay 88. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 88</div></div><div class="body" style="margin-top:14px"><div class="tag tr">THE WEIGHT OF THIS</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:10px"><div class="blr"><div style="font-size:11px;color:var(--slate2)">Every bug is someone's emergency</div></div><div class="blr"><div style="font-size:11px;color:var(--slate2)">Every missing feature is someone's information gap</div></div><div class="blr"><div style="font-size:11px;color:var(--slate2)">Every delay is someone's 60 minutes</div></div></div><div style="margin-top:12px;font-size:12px;color:var(--slate)">This is why we don't sleep much.</div></div></div>`},

{d:89,ph:'3',cap:`Drop a 🔴 if you've been following since Day 1.\n\nDrop a 🟡 if you joined after Day 30.\n\nDrop a 🟢 if you just found us.\n\nWe want to know who's been here for the whole journey.\n\n👇 #Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 89</div></div><div style="text-align:center"><div class="tag tc" style="text-align:center;margin-bottom:16px">WHO'S BEEN HERE?</div><div style="display:flex;flex-direction:column;gap:10px;max-width:220px;margin:0 auto"><div class="boxr" style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">🔴</span><span style="font-size:11px;color:var(--slate2)">Here since Day 1</span></div><div class="boxa" style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">🟡</span><span style="font-size:11px;color:var(--slate2)">Joined after Day 30</span></div><div class="boxt" style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">🟢</span><span style="font-size:11px;color:var(--slate2)">Just found us</span></div></div><div style="margin-top:12px;font-size:11px;color:var(--slate)">Drop yours below 👇</div></div></div>`},

{d:90,ph:'3',cap:`90 days.\n\n90 days of building the infrastructure that India's healthcare system should have had 10 years ago.\n\nWe're not done.\n\nWe're just getting started.\n\n10 days left. Stay close.\n\n#Yuktha #Day90 #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 90</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">90</div><div style="font-size:13px;color:#fff;margin-bottom:10px">days. Still here.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:11px;color:var(--slate);line-height:1.7">Building the infrastructure India's healthcare system should have had 10 years ago.<br><br><span style="color:var(--teal);font-weight:600">10 days left. Stay close.</span></div></div></div>`},

{d:91,ph:'3',cap:`Someone who followed this account will one day say — "I knew about Yuktha when it was just two people posting about a problem."\n\nYou're that person.\n\nShare this today. Let someone else be early too.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 91</div></div><div style="text-align:center"><div style="font-size:13px;color:var(--slate2);line-height:2;margin-bottom:14px">Someone who follows this account will one day say —<br><br><span style="color:#fff;font-weight:600;font-style:italic">"I knew about Yuktha when it was just two people posting about a problem."</span></div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:14px;font-weight:700;color:var(--teal)">You're that person.</div></div></div>`},

{d:92,ph:'3',cap:`The most important thing about Yuktha isn't the technology.\n\nIt's the problem it solves.\n\nThe technology is just how we solve it.\n\nAlways has been. Always will be.\n\nDay 92. #Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 92</div></div><div class="body" style="margin-top:14px;text-align:center"><div class="tag tc" style="text-align:center;margin-bottom:16px">THE REAL PRODUCT</div><div style="font-size:16px;color:var(--slate2);line-height:2;margin-bottom:14px">The most important thing about Yuktha isn't the technology.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px">It's the problem it solves.</div><div style="font-size:12px;color:var(--slate)">The technology is just how we solve it.<br>Always has been. Always will be.</div></div></div>`},

{d:93,ph:'3',cap:`8 days left.\n\nOn Day 100 we're going to share something that changes what Yuktha means to the people who've been following.\n\nBe here.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 93</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:8px">8</div><div style="font-size:14px;color:#fff;margin-bottom:10px">days left.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:12px;color:var(--slate);line-height:1.7">Day 100 changes something.<br>For the people who've been following.<br><span style="color:var(--teal);font-weight:600">Be here.</span></div></div></div>`},

{d:94,ph:'3',cap:`To every person who shared a post, asked a question, sent a DM, commented their blood group, tagged a friend, or just kept following since Day 1:\n\nThank you.\n\nThis is because of you.\n\nDay 94. #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 94</div></div><div class="body" style="margin-top:14px"><div class="tag tc">THANK YOU</div><div style="margin-top:12px;padding:14px;background:rgba(2,182,154,.06);border-radius:10px;border:1px solid rgba(2,182,154,.15)"><div style="font-size:12px;color:var(--slate2);line-height:1.9">To every person who shared a post.<br>Asked a question.<br>Sent a DM.<br>Commented their blood group.<br>Tagged a friend.<br>Just kept following.<br><br><span style="color:var(--teal);font-weight:600">Thank you. This is because of you.</span></div></div></div></div>`},

{d:95,ph:'3',cap:`5 days.\n\nWe're 95 days in.\n\nWe started with a problem and two people who couldn't stop thinking about it.\n\nIn 5 days — the story continues.\n\nBig things.\n\n#Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 95</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:8px">5</div><div style="font-size:14px;color:#fff;margin-bottom:10px">days left.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:12px;color:var(--slate);line-height:1.7">Started with a problem.<br>Two people who couldn't stop thinking.<br><span style="color:var(--teal);font-weight:600">In 5 days — big things.</span></div></div></div>`},

{d:96,ph:'3',cap:`What we've learned in 96 days of building in public:\n\nThe audience doesn't just watch. They care.\n\nEvery DM. Every comment. Every share. Every person who said "this happened to my family too."\n\nYou didn't just follow a startup. You became part of building it.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 96</div></div><div class="body" style="margin-top:14px"><div class="tag tc">WHAT WE LEARNED</div><div class="h3" style="margin-bottom:12px">The audience doesn't just watch.</div><div style="font-size:14px;font-weight:700;color:var(--teal);margin-bottom:14px">They care.</div><div style="font-size:11px;color:var(--slate);line-height:1.8">Every DM. Every comment.<br>Every share. Every person who said<br>"this happened to my family too."<br><br><span style="color:#fff">You didn't just follow a startup.<br>You became part of building it.</span></div></div></div>`},

let active='all';
function filterPhase(p,btn){
  active=p;
  document.querySelectorAll('.ph').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');
  render();
}
function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  const filtered=active==='all'?posts:posts.filter(p=>p.ph===active);
  filtered.forEach(p=>{
    const labels={1:'🔴 Phase 1',2:'💜 Phase 2',3:'🟢 Phase 3'};
    const div=document.createElement('div');
    div.className='card'; div.setAttribute('data-id', p.d);
    div.innerHTML=`
      <div class="card-top">
        <span class="day-num">Day ${String(p.d).padStart(2,'0')}</span>
        <span class="phase-pill pp${p.ph}">${labels[p.ph]}</span>
      </div>
      <div class="post-box">${p.vis}</div>
      <div class="cap-box" id="cb-${p.d}">${p.cap.replace(/\n/g,'<br>')}</div>
      <button class="cap-toggle" onclick="document.getElementById('cb-${p.d}').classList.toggle('open');this.textContent=this.textContent==='Show full caption ▼'?'Hide ▲':'Show full caption ▼'">Show full caption ▼</button>
      <button style="width:100%;margin-top:4px;background:#02B69A;border:none;color:#000;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;padding:7px;border-radius:6px;cursor:pointer;margin-bottom:2px" id="dlb-${p.d}" onclick="dlPost(${p.d},this)">⬇ Save Post</button>
      <button class="copy-btn" id="cpb-${p.d}" onclick="copyC(${p.d})">Copy Caption</button>
    `;
    g.appendChild(div);
  });
}
function copyC(d){
  const p=posts.find(x=>x.d===d);
  navigator.clipboard.writeText(p.cap).then(()=>{
    const b=document.getElementById('cpb-'+d);
    b.textContent='Copied ✓';b.classList.add('done');
    setTimeout(()=>{b.textContent='Copy Caption';b.classList.remove('done');},2000);
  });
}
render();

function dlPost(d, btn){
  // Find the post element
  const allCards = document.querySelectorAll('.card');
  let targetEl = null;
  allCards.forEach(card => {
    if(card.querySelector('[id="cpb-'+d+'"]')){
      targetEl = card.querySelector('.post-box > div') || card.querySelector('.post-box');
    }
  });
  if(!targetEl){ alert('Post not found.'); return; }

  // Clone post into a fullscreen overlay and let user screenshot
  const overlay = document.createElement('div');
  overlay.id = 'dl-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;background:#000;z-index:99999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  `;

  // Instructions bar
  const bar = document.createElement('div');
  bar.style.cssText = 'color:#fff;font-size:13px;font-family:DM Sans,sans-serif;text-align:center;line-height:1.8;background:rgba(0,0,0,.8);padding:12px 20px;border-radius:10px;border:1px solid #333';
  bar.innerHTML = `
    <div style="font-weight:700;color:#02B69A;margin-bottom:4px">Day ${String(d).padStart(2,'0')} — Save this post</div>
    <div style="font-size:12px;color:#aaa">
      Windows: <b style="color:#fff">Win + Shift + S</b> → select the post below<br>
      Mac: <b style="color:#fff">Cmd + Shift + 4</b> → select the post below<br>
      Or right-click the post → <b style="color:#fff">Save image as</b>
    </div>
    <button onclick="document.getElementById('dl-overlay').remove()" style="
      margin-top:10px;background:#02B69A;color:#000;border:none;
      font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
      padding:8px 20px;border-radius:8px;cursor:pointer;
    ">✕ Close</button>
  `;

  // The post clone — same exact size
  const wrap = document.createElement('div');
  wrap.style.cssText = 'width:min(80vw,80vh);aspect-ratio:1/1;border-radius:10px;overflow:hidden;box-shadow:0 0 60px rgba(2,182,154,.3)';
  const clone = targetEl.cloneNode(true);
  clone.style.cssText = 'width:100%;height:100%;';
  wrap.appendChild(clone);

  overlay.appendChild(bar);
  overlay.appendChild(wrap);
  document.body.appendChild(overlay);

  // Close on Escape
  document.addEventListener('keydown', function esc(e){
    if(e.key==='Escape'){ overlay.remove(); document.removeEventListener('keydown',esc); }
  });
}
</script>
