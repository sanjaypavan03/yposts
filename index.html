<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yuktha — 100 Instagram Posts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#02B69A;--teal2:#00D4AA;--ink:#020810;--ink2:#060F1C;--slate:#8FA3B8;--slate2:#C2D4E4;--white:#F0F8FF;--red:#E84040;--amber:#F0A020;--purple:#8B5CF6;--blue:#3B82F6;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#fff;min-height:100vh}
.header{padding:24px 24px 0;max-width:1400px;margin:0 auto}
.header h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;font-style:italic;color:var(--teal);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.header h1 .dot{width:7px;height:7px;border-radius:50%;background:var(--teal2);margin-bottom:2px}
.header p{font-size:12px;color:#555;margin-bottom:16px}
.phases{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ph{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.ph.a{background:var(--teal);color:#000;border-color:var(--teal)}
.ph:not(.a){background:#1a1a1a;color:#666;border-color:#2a2a2a}
.ph:hover:not(.a){background:#222;color:#999}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.fb{padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid #2a2a2a;background:#111;color:#555;transition:all .15s}
.fb.on{background:rgba(2,182,154,.15);border-color:var(--teal);color:var(--teal)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:0 24px 40px;max-width:1400px;margin:0 auto}
.card{display:flex;flex-direction:column;gap:8px}
.card-top{display:flex;align-items:center;gap:8px}
.day-num{font-family:'DM Mono',monospace;font-size:10px;color:#444}
.phase-pill{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:8px}
.pp1{background:rgba(232,64,64,.15);color:#E84040}
.pp2{background:rgba(139,92,246,.15);color:#A78BFA}
.pp3{background:rgba(2,182,154,.15);color:#02B69A}
.post-box{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative}
.cap-box{background:#141414;border-radius:8px;padding:10px 12px;font-size:11px;color:#666;line-height:1.6;max-height:80px;overflow:hidden;transition:max-height .3s}
.cap-box.open{max-height:500px}
.cap-toggle{font-size:10px;color:var(--teal);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;margin-top:4px}
.copy-btn{background:var(--teal);color:#000;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;padding:7px;border-radius:7px;cursor:pointer;width:100%;transition:opacity .15s}
.copy-btn:hover{opacity:.85}
.copy-btn.done{background:#1a3a2a;color:var(--teal)}
/* ── POST INNER STYLES ── */
.p{width:100%;height:100%;display:flex;flex-direction:column;padding:24px;position:relative;overflow:hidden;background:var(--ink)}
.logo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:auto}
.yl{font-family:'Playfair Display',serif;font-size:13px;font-weight:900;font-style:italic;color:var(--teal);display:inline-flex;align-items:baseline;gap:0;line-height:1}
.yl .d{font-style:normal;color:#00D4AA;font-family:'Playfair Display',serif;font-weight:900}
.yl.w{color:#fff}
.yl.w .d{color:rgba(255,255,255,0.7)}
.db{font-family:'DM Mono',monospace;font-size:9px;color:#444;background:rgba(255,255,255,.04);padding:2px 6px;border-radius:4px}
.gc{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none}
.body{flex:1;display:flex;flex-direction:column;justify-content:center}
.tag{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.tc{color:var(--teal)}.tr{color:var(--red)}.ta{color:var(--amber)}.tp{color:var(--purple)}
.h1{font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px}
.h2{font-size:18px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:6px}
.h3{font-size:15px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:6px}
.sub{font-size:11px;color:var(--slate);line-height:1.55}
.sub2{font-size:11px;color:var(--slate2);line-height:1.55}
.acc{height:3px;width:36px;border-radius:2px;margin-bottom:14px}
.bnum{font-family:'DM Mono',monospace;font-weight:700;line-height:.9}
.li{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.ld{width:5px;height:5px;border-radius:50%;background:var(--teal);margin-top:4px;flex-shrink:0}
.ldr{background:var(--red)}
.lda{background:var(--amber)}
.lt{font-size:11px;color:var(--slate2);line-height:1.4}
.mc{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;border:1px solid rgba(255,255,255,.06)}
.pill{display:inline-flex;background:rgba(2,182,154,.12);border:1px solid rgba(2,182,154,.25);border-radius:20px;padding:3px 10px;font-size:9px;color:var(--teal);font-weight:600}
.strip{background:rgba(2,182,154,.06);border-top:1px solid rgba(2,182,154,.12);padding:10px 24px;margin:-24px;margin-top:0;display:flex;align-items:center;justify-content:space-between}
.stripr{background:rgba(232,64,64,.06);border-top:1px solid rgba(232,64,64,.12)}
.row{display:flex;gap:8px;align-items:center}
.mn{font-family:'DM Mono',monospace;font-weight:700}
.teal{color:var(--teal)} .red{color:var(--red)} .amb{color:var(--amber)} .pur{color:var(--purple)}
.box{border-radius:8px;padding:12px}
.boxt{background:rgba(2,182,154,.08);border:1px solid rgba(2,182,154,.18)}
.boxr{background:rgba(232,64,64,.08);border:1px solid rgba(232,64,64,.18)}
.boxa{background:rgba(240,160,32,.08);border:1px solid rgba(240,160,32,.18)}
.boxp{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18)}
.boxn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.bl{border-left:3px solid var(--teal);border-radius:0 7px 7px 0;padding:10px 12px;background:rgba(2,182,154,.06)}
.blr{border-left:3px solid var(--red);border-radius:0 7px 7px 0;padding:10px 12px;background:rgba(232,64,64,.06)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chat-bubble{background:#1a2535;border-radius:12px 12px 12px 4px;padding:8px 12px;font-size:11px;color:var(--slate2);margin-bottom:6px;max-width:90%}
.chat-bubble.right{background:#0d2535;border-radius:12px 12px 4px 12px;margin-left:auto;color:var(--teal)}
.countdown{font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--red);line-height:.9;margin-bottom:4px}
</style>
</head>
<body>
<div class="header">
  <h1>yuktha<div class="dot"></div></h1>
  <p>100 Instagram posts — Right-click any post to save · Click Copy Caption to copy text</p>
  <div style="background:#141414;border-radius:10px;padding:12px 16px;margin-bottom:16px;border:1px solid #1e1e1e">
    <div style="font-size:11px;color:#555;margin-bottom:4px">INSTAGRAM BIO</div>
    <div style="font-size:13px;color:#fff;line-height:1.8">yuktha 🩺<br><span style="color:#888">Something is being built.</span><br><span style="color:var(--red)">🔴 60,000 hospitals. 500M patients. Zero system.</span><br><span style="color:#888">We're fixing this.</span><br><span style="color:var(--teal)">👇 Join the waitlist</span><br><span style="color:var(--teal)">yuktha.health</span></div>
    <button onclick="navigator.clipboard.writeText('yuktha 🩺\nSomething is being built.\n🔴 60,000 hospitals. 500M patients. Zero system.\nWe\'re fixing this.\n👇 Join the waitlist\nyuktha.health')" style="background:var(--teal);color:#000;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;padding:6px 14px;border-radius:6px;cursor:pointer;margin-top:8px">Copy Bio</button>
  </div>
  <div class="phases">
    <button class="ph a" onclick="filterPhase('all',this)">All 100</button>
    <button class="ph" onclick="filterPhase('1',this)">Phase 1 — Problem (Days 1–30)</button>
    <button class="ph" onclick="filterPhase('2',this)">Phase 2 — Tease (Days 31–60)</button>
    <button class="ph" onclick="filterPhase('3',this)">Phase 3 — Launch (Days 61–100)</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<script>
const posts=[
// PHASE 1 — PROBLEM (Days 1-30)
{d:1,ph:'1',cap:`This isn't fiction.\n\nThis happens every single day across India.\n\nA man collapses. The ambulance arrives. The doctor asks three questions. Nobody knows the answers.\n\nFollow this page. Something is coming. 🔴\n\n#MedicalEmergency #India #GoldenHour`,vis:`<div class="p" style="background:#020810;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(232,64,64,.12);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="body" style="text-align:center;justify-content:center"><div style="font-size:13px;color:var(--slate);line-height:2.2;margin-bottom:16px">A man collapsed in Hyderabad.<br>The ambulance arrived in 8 minutes.<br>The doctor asked three questions.<br>Nobody knew the answers.</div><div style="height:2px;width:40px;background:var(--red);margin:0 auto 14px"></div><div style="font-size:15px;font-weight:700;color:var(--red)">He didn't make it.</div></div><div style="position:absolute;bottom:24px;left:24px;right:24px;text-align:center;font-size:9px;color:#333;letter-spacing:.1em">THIS IS NOT FICTION</div></div>`},

{d:2,ph:'1',cap:`60 minutes.\n\nThat's all the time a doctor has after a medical emergency to make the decisions that matter.\n\nEvery second wasted looking for information is a second not spent saving a life.\n\nFollow. More tomorrow. 🔴\n\n#GoldenHour #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:350px;height:350px;background:rgba(232,64,64,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 02</div></div><div style="text-align:center"><div class="countdown">60</div><div style="font-size:28px;font-weight:700;color:#fff;margin-bottom:8px">minutes.</div><div style="font-size:11px;color:var(--slate);line-height:1.6">The window after a medical emergency<br>where every second decides everything.</div></div><div style="position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:9px;color:var(--red);letter-spacing:.12em">THE GOLDEN HOUR</div></div>`},

{d:3,ph:'1',cap:`Three questions.\n\nAnswer them right now. Out loud. Confidently.\n\nIf you hesitated on even one — you need to know what we're building.\n\nFollow. Something is coming. 👀\n\n#MedicalEmergency #Yuktha`,vis:`<div class="p" style="background:#020810;justify-content:center"><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 03</div></div><div class="body"><div class="tag tr" style="margin-bottom:16px">CAN YOU ANSWER THESE?</div><div style="display:flex;flex-direction:column;gap:10px"><div class="blr"><div style="font-size:14px;font-weight:600;color:#fff">What is your blood group?</div></div><div class="blr"><div style="font-size:14px;font-weight:600;color:#fff">What are you allergic to?</div></div><div style="border-left:3px solid var(--slate);border-radius:0 7px 7px 0;padding:10px 12px;background:rgba(255,255,255,.03)"><div style="font-size:14px;font-weight:600;color:#fff">What medications are you on?</div></div></div><div style="margin-top:16px;font-size:11px;color:var(--slate)">Right now. Without checking your phone.<br><span style="color:var(--red)">The silence is the problem.</span></div></div></div>`},

{d:4,ph:'1',cap:`This conversation is happening in Indian hospital corridors right now. Tonight.\n\nDon't be this family.\n\nTag someone who needs to see this. 👇\n\n#MedicalEmergency #India #Healthcare`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 04</div></div><div class="body" style="margin-top:16px"><div class="tag tr">A REAL CONVERSATION</div><div style="display:flex;flex-direction:column;gap:4px"><div class="chat-bubble">What's Dad's blood group?</div><div class="chat-bubble right">I don't know</div><div class="chat-bubble">What do you mean you don't know</div><div class="chat-bubble right">Ask Mama</div><div class="chat-bubble">Mama is in the operation theatre</div><div class="chat-bubble right" style="background:#1a0a0a;color:var(--red)">...</div></div></div><div class="strip stripr" style="margin-top:auto"><span style="font-size:10px;color:var(--red);font-style:italic">This is happening in hospitals across India. Tonight.</span></div></div>`},

{d:5,ph:'1',cap:`The most important information about you is locked behind your phone password.\n\nThe one person who needs it most — the doctor treating you at 3AM — can't get in.\n\nSleep on that.\n\nFollowing this page might be the most important thing you did today.\n\n#MedicalEmergency #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(232,64,64,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 05</div></div><div style="text-align:center"><div style="width:80px;height:80px;border-radius:20px;background:rgba(232,64,64,.1);border:2px solid rgba(232,64,64,.3);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px">🔒</div><div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px">Your phone is locked.</div><div style="font-size:12px;color:var(--slate);line-height:1.6">The doctor treating you at 3AM<br>needs what's inside it.<br>They can't get in.</div></div></div>`},

{d:6,ph:'1',cap:`Not a few hospitals. Not old hospitals.\n\n60,000+ private hospitals across India right now — running on paper and prayer.\n\nSomething is being built to change this. Stay close. 🔴\n\n#HealthTech #India #Healthcare`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 06</div></div><div class="body" style="margin-top:16px;text-align:center"><div class="tag tr" style="text-align:center">HOW 60,000 HOSPITALS RUN TODAY</div><div style="display:flex;flex-direction:column;gap:8px;text-align:left;margin-top:8px"><div class="boxn" style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">📋</span><span style="font-size:12px;color:var(--slate2)">Paper registers</span></div><div class="boxn" style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">📱</span><span style="font-size:12px;color:var(--slate2)">WhatsApp screenshots</span></div><div class="boxn" style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🧠</span><span style="font-size:12px;color:var(--slate2)">Memory</span></div></div><div style="margin-top:14px;font-size:13px;font-weight:600;color:var(--red)">This is your healthcare infrastructure.</div></div></div>`},

{d:7,ph:'1',cap:`I'm a 3rd year engineering student.\n\nI found a problem I couldn't stop thinking about.\n\nSo I started building something.\n\nI don't know if it'll work.\n\nBut I know the problem is real.\n\nFollow the journey.\n\nDay 7 of building in public. #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 07</div></div><div class="body" style="margin-top:16px"><div class="tag tc">BUILDING IN PUBLIC</div><div class="h2" style="margin-bottom:14px">Day 7.</div><div class="bl" style="margin-bottom:10px"><div style="font-size:12px;color:var(--slate2);line-height:1.7">I'm a 3rd year engineering student.<br>I found a problem I couldn't stop thinking about.<br>So I started building something.</div></div><div style="font-size:12px;color:var(--slate)">I don't know yet if it'll work.<br>But I know the problem is real.</div></div><div class="strip"><span style="font-size:10px;color:var(--teal)">Day 7 of building in public. Follow the journey.</span></div></div>`},

{d:8,ph:'1',cap:`You've been here before.\n\nFilling the same form you filled last time. At the same hospital.\n\nBecause nobody connected your records from the last visit.\n\nEvery hospital. Blank slate. Every time.\n\nThis is not how it should work. #Healthcare #India`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 08</div></div><div class="body" style="margin-top:16px"><div class="tag ta">SAME FORM. EVERY TIME.</div><div class="h2" style="margin-bottom:14px">You've been here before.</div><div style="display:flex;flex-direction:column;gap:6px"><div class="li"><div class="ld lda"></div><div class="lt">Same hospital. Same form. Same questions.</div></div><div class="li"><div class="ld lda"></div><div class="lt">They don't remember you from last time.</div></div><div class="li"><div class="ld lda"></div><div class="lt">Your old records? Different file. Different room.</div></div><div class="li"><div class="ld ldr"></div><div class="lt" style="color:var(--red)">Every visit. Blank slate.</div></div></div><div style="margin-top:14px;font-size:11px;color:var(--slate)">This is not how healthcare should work in 2025.</div></div></div>`},

{d:9,ph:'1',cap:`She's a doctor.\n\nIn her first year of clinical training she watched a patient go into anaphylactic shock because nobody told the emergency team about a penicillin allergy sitting in a file at another hospital.\n\nThe information existed. It just wasn't there.\n\nShe decided she couldn't keep watching this happen.\n\nShe's building something about it. 🩺`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 09</div></div><div class="body" style="margin-top:16px"><div class="tag tp">THE CO-FOUNDER</div><div style="width:52px;height:52px;border-radius:50%;background:rgba(139,92,246,.2);border:2px solid rgba(139,92,246,.4);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px">🩺</div><div class="boxp" style="margin-bottom:10px"><div style="font-size:11px;color:var(--slate2);line-height:1.7;font-style:italic">"I watched a patient go into shock because nobody knew about a penicillin allergy sitting in a file at another hospital. The information existed. It just wasn't there."</div></div><div style="font-size:11px;color:var(--purple)">Dr. Naga Keerthana — MBBS, Co-Founder</div></div></div>`},

{d:10,ph:'1',cap:`Your medical history is in 4 different hospitals and nobody knows where.\n\nClinic A has your 2019 diagnosis.\nHospital B has your 2021 surgery notes.\nLab C has your last blood report.\nNobody has the complete picture.\n\nNot even you.\n\nTag someone this is true for. 👇\n\n#MedicalRecords #India`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 10</div></div><div class="body" style="margin-top:16px"><div class="tag tr">YOUR RECORDS ARE SCATTERED</div><div style="display:flex;flex-direction:column;gap:8px"><div class="blr"><div style="font-size:11px;color:var(--slate2)">Clinic A — your 2019 diagnosis</div></div><div class="blr"><div style="font-size:11px;color:var(--slate2)">Hospital B — your 2021 surgery notes</div></div><div class="blr"><div style="font-size:11px;color:var(--slate2)">Lab C — your last blood report</div></div><div style="border-left:3px solid #444;border-radius:0 7px 7px 0;padding:10px 12px;background:rgba(255,255,255,.02)"><div style="font-size:11px;color:#555">Nobody has the complete picture.</div></div></div><div style="margin-top:12px;font-size:12px;font-weight:600;color:var(--red)">Not even you.</div></div></div>`},

{d:11,ph:'1',cap:`Less than 3% of Indians can access their complete medical records digitally.\n\nIn a country of 1.4 billion people.\n\nYour health records belong to you. You should be able to access, share, and protect them on your terms.\n\nThis is what we're working on. Follow to find out what.\n\n#DigitalHealth #India`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(232,64,64,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 11</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:88px;font-weight:700;color:var(--red);line-height:.9;margin-bottom:6px">3%</div><div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:6px">of Indians have digital health records</div><div style="font-size:10px;color:var(--slate)">In a country of 1.4 billion people.</div><div style="height:2px;width:36px;background:var(--teal);margin:12px auto"></div><div style="font-size:10px;color:var(--teal)">We're changing this.</div></div></div>`},

{d:12,ph:'1',cap:`Your doctor has 3 minutes per patient.\n\nIn those 3 minutes they need to remember your history, check your allergies, review your last prescription, and make a new decision.\n\nFrom a paper file. From memory. From a WhatsApp photo.\n\nWe can do better. Something is coming. 👀\n\n#Healthcare #HealthTech`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 12</div></div><div class="body" style="margin-top:16px"><div class="tag tc">YOUR DOCTOR HAS</div><div style="font-family:'DM Mono',monospace;font-size:64px;font-weight:700;color:var(--teal);line-height:.9;margin-bottom:4px">3</div><div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:12px">minutes per patient.</div><div style="display:flex;flex-direction:column;gap:6px"><div class="li"><div class="ld"></div><div class="lt">Remember your full history</div></div><div class="li"><div class="ld"></div><div class="lt">Check your allergies</div></div><div class="li"><div class="ld"></div><div class="lt">Review your last prescription</div></div><div class="li"><div class="ld"></div><div class="lt">Make a new decision</div></div></div><div style="margin-top:12px;font-size:11px;color:var(--red)">From a paper file. From memory.</div></div></div>`},

{d:13,ph:'1',cap:`Tonight while you sleep, somewhere in India a doctor is treating a patient with no information.\n\nNo history. No allergies. No medications.\n\nTreating blindly.\n\nThis is the problem we can't stop thinking about.\n\nDay 13. Still building.\n\n#BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(139,92,246,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 13</div></div><div class="body" style="text-align:center"><div class="tag tp" style="text-align:center">TONIGHT</div><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">Somewhere in India<br>a doctor is treating a patient<br>with no information.<br>No history. No allergies.<br>No medications.<br><span style="color:var(--purple)">Treating blindly.</span></div><div style="font-size:11px;color:var(--slate)">This is the problem we can't stop thinking about.</div></div></div>`},

{d:14,ph:'1',cap:`2 weeks in.\n\nWe haven't shown you a product yet.\n\nBecause the problem needs to be felt before the solution can be understood.\n\nDo you feel it yet?\n\nGood.\n\nDrop a 🔴 below if you're following this journey.\n\n#BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 14</div></div><div class="body" style="margin-top:16px;text-align:center"><div class="tag tc" style="text-align:center">2 WEEKS</div><div style="font-family:'DM Mono',monospace;font-size:72px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:8px">14</div><div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:8px">days of talking about a problem.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:12px;color:var(--slate);line-height:1.6">No product revealed yet.<br>No features shown yet.<br>Just the problem.<br><span style="color:#fff;font-weight:600">Do you feel it yet?</span></div></div></div>`},

{d:15,ph:'1',cap:`Someone set up their Emergency QR today in Hyderabad.\n\nSomeone set it up in Warangal.\n\nSomeone in Nizamabad.\n\nThe question is — does the person next to you have one?\n\nBecause when it matters, that's the only difference.\n\nJoin the waitlist. Link in bio. #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 15</div></div><div class="body" style="margin-top:16px"><div class="tag tc">IT'S SPREADING</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"><div class="boxt" style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">📍</span><span style="font-size:11px;color:var(--slate2)">Someone just set it up in <span style="color:#fff;font-weight:600">Hyderabad</span></span></div><div class="boxt" style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">📍</span><span style="font-size:11px;color:var(--slate2)">Someone just set it up in <span style="color:#fff;font-weight:600">Warangal</span></span></div><div class="boxt" style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">📍</span><span style="font-size:11px;color:var(--slate2)">Someone just set it up in <span style="color:#fff;font-weight:600">Nizamabad</span></span></div></div><div style="font-size:12px;color:var(--red);font-weight:600">Does the person next to you have one?</div></div></div>`},

{d:16,ph:'1',cap:`If you've ever been to a small private clinic — your records are in a paper file somewhere.\n\nNobody else can see them.\nNobody else ever will.\n\nUnless we change this.\n\nWe're changing this.\n\nDay 16. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810;justify-content:center"><div class="gc" style="width:260px;height:260px;background:rgba(240,160,32,.07);bottom:-80px;left:50%;transform:translateX(-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 16</div></div><div class="body" style="text-align:center"><div class="tag ta" style="text-align:center">YOUR RECORDS</div><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">Are in a paper file.<br>At a clinic across town.<br>In a drawer.<br>Nobody else can see them.<br><span style="color:var(--amber)">Nobody else ever will.</span></div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:12px;color:var(--teal);font-weight:600">Unless we change this.<br>We're changing this.</div></div></div>`},

{d:17,ph:'1',cap:`An engineer who builds things.\n\nA doctor who understands what breaks.\n\nWe're siblings.\n\nWe're co-founders.\n\nAnd we're building something India's healthcare system has never seen before.\n\nSoon.\n\nFollow the journey. 🩺`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 17</div></div><div class="body" style="margin-top:16px;text-align:center"><div class="tag tc" style="text-align:center">THE TEAM</div><div style="display:flex;gap:12px;justify-content:center;margin:14px 0"><div style="text-align:center"><div style="width:52px;height:52px;border-radius:50%;background:rgba(2,182,154,.2);border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 6px">⚙️</div><div style="font-size:11px;font-weight:600;color:#fff">Sanjay Pavan</div><div style="font-size:9px;color:var(--teal)">Engineer & CEO</div></div><div style="display:flex;align-items:center;font-size:18px;color:#333">+</div><div style="text-align:center"><div style="width:52px;height:52px;border-radius:50%;background:rgba(139,92,246,.2);border:2px solid var(--purple);display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 6px">🩺</div><div style="font-size:11px;font-weight:600;color:#fff">Naga Keerthana</div><div style="font-size:9px;color:var(--purple)">MBBS & CMO</div></div></div><div style="font-size:11px;color:var(--slate);line-height:1.6">Siblings. Co-founders.<br>Building something India's healthcare<br>system has never seen before.</div></div></div>`},

{d:18,ph:'1',cap:`The best healthcare infrastructure in India is in cities most people don't live in.\n\nWarangal. Nizamabad. Karimnagar. Nellore. Tirupati.\n\nMillions of people. Dozens of hospitals. Zero digital systems.\n\nWhat we're building is specifically for them. Not for Bangalore. For Bharat. 🇮🇳\n\n#BharatHealthcare`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 18</div></div><div class="body" style="margin-top:16px"><div class="tag tc">NOT FOR BANGALORE.</div><div class="h1" style="font-size:24px;margin-bottom:14px;color:var(--teal)">For Bharat. 🇮🇳</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"><div style="background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--slate2)">Warangal</div><div style="background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--slate2)">Nizamabad</div><div style="background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--slate2)">Karimnagar</div><div style="background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--slate2)">Nellore</div><div style="background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--slate2)">Tirupati</div></div><div style="font-size:11px;color:var(--slate)">Millions of people. Dozens of hospitals.<br>Zero digital systems.<br><span style="color:#fff">That's who we're building for.</span></div></div></div>`},

{d:19,ph:'1',cap:`What's the scariest thing about medical emergencies in India?\n\nComment below.\n\nWe're not asking to make content.\n\nWe're asking because every answer shapes what we're building.\n\nBe honest. 👇\n\n#India #Healthcare #MedicalEmergency`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 19</div></div><div style="text-align:center"><div class="tag tc" style="text-align:center;margin-bottom:14px">ASK US ANYTHING</div><div style="font-size:20px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:14px">"What's the scariest thing about medical emergencies in India?"</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:11px;color:var(--slate)">Comment below. Every answer shapes what we're building.</div></div></div>`},

{d:20,ph:'1',cap:`20 days of posting about a problem most people ignore.\n\nWe haven't shown you a single feature yet.\n\nBecause the problem needs to be felt before the solution can be understood.\n\nDo you feel it yet?\n\nGood.\n\nPhase 2 starts next week. Stay very close. 👀\n\n#BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 20</div></div><div class="body" style="margin-top:16px;text-align:center"><div class="tag tc" style="text-align:center">20 DAYS.</div><div style="font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">20</div><div style="font-size:13px;color:#fff;margin-bottom:10px">days. 0 product reveals. 100% real problem.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:11px;color:var(--slate);line-height:1.6">Phase 2 starts next week.<br><span style="color:var(--teal);font-weight:600">Stay very close. 👀</span></div></div></div>`},
// Days 21-30
{d:21,ph:'1',cap:`Something you can scan in an emergency.\n\nThat tells a doctor everything they need to know.\n\nIn 3 seconds.\n\nWithout internet.\n\nWithout login.\n\nWithout you being conscious.\n\nWe'll show you what this is next week.\n\nFollow so you don't miss it. 👀\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 21</div></div><div style="text-align:center"><div style="width:90px;height:90px;border-radius:16px;background:rgba(2,182,154,.08);border:2px solid rgba(2,182,154,.3);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;filter:blur(2px)">⬛</div><div style="font-size:13px;color:var(--slate2);line-height:2">Something you can scan.<br>3 seconds.<br>No internet. No login.<br>Even if you're unconscious.</div><div style="margin-top:14px;font-size:12px;font-weight:700;color:var(--teal)">Revealed next week. 👀</div></div></div>`},

{d:22,ph:'1',cap:`We walked into IIT Delhi Becon 2026 with a problem and a product.\n\nWalked out with confirmation — the problem is real and the solution is right.\n\nWe're not ready to show everything yet.\n\nBut we're close. Very close.\n\n👀 Day 22. #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 22</div></div><div class="body" style="margin-top:16px"><div class="tag tc">IIT DELHI BECON 2026</div><div class="h3" style="margin-bottom:12px">Walked in with a problem and a product.</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The problem is real."</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The market is enormous."</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The product is built."</div></div></div><div style="font-size:11px;color:var(--teal)">Not ready to show everything yet. But close. Very close. 👀</div></div></div>`},

{d:23,ph:'1',cap:`This is the name.\n\nYuktha.\n\nIn Sanskrit — meaning connected. United. Together.\n\nHealth connected. Care protected.\n\nMore next week.\n\n👀 #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 23</div></div><div style="text-align:center"><div style="font-family:'Playfair Display',serif;font-size:52px;font-weight:900;font-style:italic;color:var(--teal);letter-spacing:-1px;margin-bottom:6px">yuktha</div><div style="font-size:11px;color:var(--slate);letter-spacing:.12em;margin-bottom:14px">SANSKRIT — MEANING CONNECTED</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:12px;color:var(--slate2);line-height:1.7">Health connected.<br>Care protected.</div></div></div>`},

{d:24,ph:'1',cap:`We asked 50 people to check their phone for their blood group right now.\n\n43 couldn't find it.\n6 found it in an old WhatsApp message.\n1 had it ready.\n\nBe the 1.\n\nSomething coming very soon. Stay close. 👀\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 24</div></div><div class="body" style="margin-top:16px"><div class="tag tr">WE ASKED 50 PEOPLE</div><div class="h3" style="margin-bottom:14px">"Find your blood group right now."</div><div style="display:flex;flex-direction:column;gap:8px"><div class="boxr" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--slate2)">Couldn't find it</span><span class="mn" style="color:var(--red);font-size:20px">43</span></div><div class="boxa" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--slate2)">Found it in WhatsApp</span><span class="mn" style="color:var(--amber);font-size:20px">6</span></div><div class="boxt" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--slate2)">Had it ready</span><span class="mn" style="color:var(--teal);font-size:20px">1</span></div></div><div style="margin-top:12px;font-size:13px;font-weight:700;color:var(--teal)">Be the 1.</div></div></div>`},

{d:25,ph:'1',cap:`7 days.\n\nWe're going to show you what we've been building.\n\nIf you've been following since Day 1 — you're about to understand why every post before this was necessary.\n\nIf you're new — read from Day 1. Then come back.\n\nYou'll want to be ready. 👀\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 25</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:88px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">7</div><div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:10px">days until the reveal.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:11px;color:var(--slate)">If you've been here since Day 1 — you're about to understand why every post was necessary.</div></div></div>`},

{d:26,ph:'1',cap:`6 days.\n\nThe problem we've been talking about for 25 days?\n\nWe built the solution.\n\nIt works. It's real.\n\nAnd in 6 days you'll see it for the first time.\n\nTag someone who should see this. 👇\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 26</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:88px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">6</div><div style="font-size:14px;color:var(--slate2);line-height:1.7;margin-bottom:12px">The problem we've been talking about for 25 days?<br><span style="color:#fff;font-weight:600">We built the solution.</span><br>It works. It's real.</div><div style="font-size:11px;color:var(--teal)">Tag someone who should see this. 👇</div></div></div>`},

{d:27,ph:'1',cap:`5 days.\n\nA hospital owner in Telangana has been waiting for something like this for 15 years.\n\nHe said — "I didn't think software like this existed for hospitals like mine."\n\nIt does now.\n\n5 days. 👀 #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:260px;height:260px;background:rgba(240,160,32,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 27</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:88px;font-weight:700;color:var(--amber);line-height:1;margin-bottom:12px">5</div><div class="boxa" style="text-align:left"><div style="font-size:10px;color:var(--amber);font-weight:700;margin-bottom:6px">HOSPITAL OWNER, TELANGANA</div><div style="font-size:11px;color:var(--slate2);font-style:italic">"I didn't think software like this existed for hospitals like mine."</div></div><div style="margin-top:10px;font-size:11px;color:var(--teal)">It does now. 👀</div></div></div>`},

{d:31,ph:'2',cap:`This is Yuktha.\n\nOne QR code on your phone. Any doctor. Any hospital. Any emergency.\n\nScan it — blood group, allergies, medications. Instant. No internet. No login. No delay.\n\nFor hospitals — appointments, prescriptions, patient records, AI reports in 22 Indian languages.\n\nWaitlist is open. Link in bio.\n\nHealth connected. Care protected.\n\n— Sanjay & Keerthana 🩺 #Yuktha #Launch`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:350px;height:350px;background:rgba(2,182,154,.12);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl" style="font-size:16px;color:var(--teal)"><span>yuktha</span><div class="d" style="width:6px;height:6px"></div></div><div class="db">DAY 31 — THE REVEAL</div></div><div class="body" style="margin-top:16px;text-align:center"><div style="font-size:11px;color:var(--teal);letter-spacing:.12em;font-weight:700;margin-bottom:14px">INTRODUCING</div><div style="font-family:'Playfair Display',serif;font-size:44px;font-weight:900;font-style:italic;color:var(--teal);letter-spacing:-1px;margin-bottom:4px">yuktha</div><div style="font-size:10px;color:var(--slate);letter-spacing:.1em;margin-bottom:16px">HEALTH CONNECTED. CARE PROTECTED.</div><div class="boxt" style="margin-bottom:8px"><div style="font-size:11px;color:var(--slate2)">Emergency QR · AI Reports · Hospital OS</div></div><div style="font-size:11px;color:var(--teal);font-weight:600">Waitlist open. Link in bio.</div></div></div>`},

{d:32,ph:'2',cap:`The feature that started everything.\n\nThe Emergency QR.\n\nOne scan. Three seconds. Blood group, allergies, medications — instant.\n\nNo internet needed. No login needed. No consciousness required.\n\nSet it up in 3 minutes. Link in bio.\n\n#Yuktha #EmergencyQR`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:280px;height:280px;background:rgba(232,64,64,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 32</div></div><div class="body" style="margin-top:14px"><div class="tag tr">THE FEATURE THAT STARTED EVERYTHING</div><div style="text-align:center;margin:14px 0"><div style="width:80px;height:80px;border-radius:16px;background:rgba(232,64,64,.1);border:2px solid rgba(232,64,64,.3);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px">🆘</div><div class="h2" style="margin-bottom:8px">Emergency QR</div><div style="font-size:11px;color:var(--slate);line-height:1.7">One scan. 3 seconds.<br>Blood group · Allergies · Medications<br>No internet. No login.<br>Even if you're unconscious.</div></div></div><div class="strip stripr"><span style="font-size:10px;color:var(--red)">Set up in 3 minutes. Link in bio.</span></div></div>`},

{d:33,ph:'2',cap:`Your lab report. In Telugu.\n\nOr Hindi. Or Tamil. Or Kannada. Or any of 19 more Indian languages.\n\nYuktha's AI reads your report, highlights what's abnormal, and explains it in the language you actually think in.\n\nYou shouldn't need a medical degree to understand your own health.\n\n#Yuktha #AIHealth`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 33</div></div><div class="body" style="margin-top:14px"><div class="tag tp">AI IN 22 LANGUAGES</div><div class="h2" style="margin-bottom:12px">Your lab report.<br>In your language.</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px"><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Telugu</div><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Hindi</div><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Tamil</div><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Kannada</div><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Malayalam</div><div style="background:rgba(2,182,154,.1);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--teal)">Bengali</div><div style="background:rgba(255,255,255,.05);border-radius:4px;padding:2px 8px;font-size:9px;color:var(--slate)">+16 more</div></div><div style="font-size:11px;color:var(--slate)">You shouldn't need a medical degree<br>to understand your own health.</div></div></div>`},

{d:34,ph:'2',cap:`This is what a hospital looks like after Yuktha.\n\nAppointments. Prescriptions. Patient records. Staff management. Analytics.\n\nOne screen. One subscription. Starting at ₹3,500/month.\n\nOne busy consultation day pays for the entire month.\n\n#Yuktha #HospitalOS`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 34</div></div><div class="body" style="margin-top:14px"><div class="tag tc">THE HOSPITAL DASHBOARD</div><div class="grid2" style="gap:6px;margin-top:8px"><div class="boxt" style="text-align:center"><div style="font-size:18px;margin-bottom:4px">📅</div><div style="font-size:9px;color:var(--teal)">Appointments</div></div><div class="boxt" style="text-align:center"><div style="font-size:18px;margin-bottom:4px">💊</div><div style="font-size:9px;color:var(--teal)">Prescriptions</div></div><div class="boxn" style="text-align:center"><div style="font-size:18px;margin-bottom:4px">👥</div><div style="font-size:9px;color:var(--slate)">Staff</div></div><div class="boxn" style="text-align:center"><div style="font-size:18px;margin-bottom:4px">📊</div><div style="font-size:9px;color:var(--slate)">Analytics</div></div></div><div style="margin-top:10px" class="boxt"><div style="font-size:11px;color:var(--teal);text-align:center">Starting at ₹3,500/month<br><span style="font-size:10px;color:var(--slate)">One consultation day pays for the whole month</span></div></div></div></div>`},

{d:35,ph:'2',cap:`The silent killer nobody talks about.\n\nMissed doses.\n\n50% of chronic disease patients don't take their medications correctly. This leads to ₹35,000 crore in avoidable hospitalizations every year.\n\nYuktha's pill tracker changes this.\n\nReminders. Adherence score. Refill alerts. Automated.\n\n#Yuktha #MedicationAdherence`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 35</div></div><div class="body" style="margin-top:14px"><div class="tag ta">PILL TRACKER</div><div class="h2" style="margin-bottom:4px">The silent killer</div><div style="font-size:13px;color:var(--amber);font-weight:600;margin-bottom:12px">nobody talks about.</div><div style="display:flex;flex-direction:column;gap:6px"><div class="boxt" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;font-weight:600;color:#fff">Metformin 500mg</div><div style="font-size:9px;color:var(--slate)">8:00 AM · After breakfast</div></div><div style="background:var(--teal);color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px">TAKEN ✓</div></div><div class="boxn" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;font-weight:600;color:#fff">Amlodipine 5mg</div><div style="font-size:9px;color:var(--slate)">9:00 PM · After dinner</div></div><div style="background:rgba(255,255,255,.06);color:var(--slate);font-size:9px;padding:3px 8px;border-radius:5px">PENDING</div></div></div></div></div>`},

{d:36,ph:'2',cap:`What a doctor sees when they scan your QR.\n\nIn 3 seconds — full medical history, allergies, medications, chronic conditions.\n\nNo login. No internet. No delay.\n\nThis is the Yuktha Doctor Portal.\n\n#Yuktha #DoctorTech`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 36</div></div><div class="body" style="margin-top:14px"><div class="tag tc">DOCTOR PORTAL</div><div class="h3" style="margin-bottom:12px">What a doctor sees when they scan your QR.</div><div style="display:flex;flex-direction:column;gap:6px"><div class="boxn" style="display:flex;gap:8px;align-items:center"><span style="font-size:16px">🩺</span><div><div style="font-size:10px;font-weight:600;color:#fff">Full medical history</div><div style="font-size:9px;color:var(--slate)">Instant on scan</div></div></div><div class="boxn" style="display:flex;gap:8px;align-items:center"><span style="font-size:16px">⚠️</span><div><div style="font-size:10px;font-weight:600;color:#fff">Allergies & medications</div><div style="font-size:9px;color:var(--slate)">Always current</div></div></div><div class="boxt" style="display:flex;gap:8px;align-items:center"><span style="font-size:16px">⚡</span><div><div style="font-size:10px;font-weight:600;color:var(--teal)">3 seconds. No internet needed.</div></div></div></div></div></div>`},

{d:37,ph:'2',cap:`You control what the world sees.\n\nTier 1 — public for any doctor in an emergency. Blood group, allergies, medications.\n\nTier 2 — hospital only. Full history.\n\nYou decide. Every time.\n\nYour data. Your rules.\n\n#Yuktha #DataPrivacy`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 37</div></div><div class="body" style="margin-top:14px"><div class="tag tc">TWO-TIER PRIVACY</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:8px"><div class="boxr"><div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:4px">🔓 TIER 1 — ANY DOCTOR</div><div style="font-size:10px;color:var(--slate2)">Blood group · Allergies · Emergency contact · Medications · Chronic conditions</div><div style="font-size:9px;color:var(--slate);margin-top:4px">No login needed. Scanned by anyone.</div></div><div class="boxt"><div style="font-size:10px;font-weight:700;color:var(--teal);margin-bottom:4px">🔒 TIER 2 — HOSPITAL ONLY</div><div style="font-size:10px;color:var(--slate2)">Full history · Lab reports · Surgery notes · Insurance</div><div style="font-size:9px;color:var(--teal);margin-top:4px">Requires verified hospital login.</div></div></div><div style="margin-top:10px;font-size:11px;color:var(--slate)">You control it all. Your rules.</div></div></div>`},

{d:38,ph:'2',cap:`No WiFi in an emergency?\n\nYuktha still works.\n\nCritical data is embedded directly in the QR code — not just a URL. Any phone camera can scan it. No internet required.\n\nBecause emergencies don't come with a WiFi guarantee.\n\n#Yuktha #EmergencyQR`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 38</div></div><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">📵</div><div class="h2" style="margin-bottom:6px">No WiFi?</div><div style="font-size:16px;font-weight:700;color:var(--teal);margin-bottom:12px">Yuktha still works.</div><div style="font-size:11px;color:var(--slate);line-height:1.6">Data embedded in the QR itself.<br>Any phone camera. Any doctor.<br>No internet. No app.<br>Always works.</div></div></div>`},

{d:43,ph:'2',cap:`Every day you don't have your Emergency QR set up is a day you're trusting your life to other people's memory.\n\nMemory is unreliable.\n\nYuktha isn't.\n\n3 minutes. Link in bio.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(240,160,32,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 43</div></div><div style="text-align:center"><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">Every day without<br>your Emergency QR<br>is a day you're trusting<br>your life to someone<br>else's memory.</div><div style="height:2px;width:36px;background:var(--amber);margin:0 auto 12px"></div><div style="font-size:13px;font-weight:700;color:#fff">Memory is unreliable.</div><div style="font-size:13px;font-weight:700;color:var(--teal)">Yuktha isn't.</div></div></div>`},

{d:44,ph:'2',cap:`A hospital in Telangana went from paper to fully digital in 48 hours last week.\n\nThe owner's words: "My patients can now book appointments at midnight. My doctors see every prescription ever written. My receptionist doesn't chase paper anymore."\n\n48 hours.\n\nYour hospital hasn't done this yet.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 44</div></div><div class="body" style="margin-top:14px"><div class="tag tc">48 HOURS</div><div class="h3" style="margin-bottom:12px">Paper to fully digital.<br>In 48 hours.</div><div class="boxt" style="margin-bottom:12px"><div style="font-size:10px;color:var(--teal);font-weight:700;margin-bottom:6px">HOSPITAL OWNER, TELANGANA</div><div style="font-size:11px;color:var(--slate2);font-style:italic;line-height:1.6">"My patients book at midnight. My doctors see every prescription ever written. My receptionist doesn't chase paper anymore."</div></div><div style="font-size:12px;color:var(--red);font-weight:600">Your hospital hasn't done this yet.</div></div></div>`},

{d:45,ph:'2',cap:`Something happened this week that we can't fully talk about yet.\n\nBut it changes what Yuktha becomes.\n\nStay close.\n\nDay 45. 🔴\n\n#BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 45</div></div><div style="text-align:center"><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">Something happened<br>this week.<br>We can't fully<br>talk about it yet.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:14px;font-weight:700;color:var(--teal)">But it changes<br>what Yuktha becomes.</div><div style="margin-top:12px;font-size:11px;color:var(--slate)">Stay close. 🔴</div></div></div>`},

{d:46,ph:'2',cap:`You have travel insurance.\nYou have car insurance.\nYou have health insurance.\n\nBut does your doctor know your blood group when you're unconscious?\n\nThat's the only insurance that matters in the first 60 minutes.\n\nLink in bio. #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 46</div></div><div class="body" style="margin-top:14px"><div class="tag ta">THE INSURANCE YOU'RE MISSING</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px"><div class="boxn" style="display:flex;align-items:center;gap:8px"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Travel insurance</span></div><div class="boxn" style="display:flex;align-items:center;gap:8px"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Car insurance</span></div><div class="boxn" style="display:flex;align-items:center;gap:8px"><span>✅</span><span style="font-size:11px;color:var(--slate2)">Health insurance</span></div><div class="boxr" style="display:flex;align-items:center;gap:8px"><span>❌</span><span style="font-size:11px;color:var(--slate2)">Doctor knows blood group when unconscious</span></div></div><div style="font-size:11px;color:var(--red);font-weight:600">That last one is the only insurance that matters in the first 60 minutes.</div></div></div>`},

{d:47,ph:'2',cap:`If you followed us on Day 1, you were early.\n\nIf you're following today, you're still early.\n\nAt some point you won't be early anymore.\n\nJust saying. 👀\n\n#Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 47</div></div><div style="text-align:center"><div style="font-size:14px;color:var(--slate2);line-height:2.2;margin-bottom:14px">Day 1 follower?<br><span style="color:var(--teal);font-weight:600">Early.</span><br><br>Following today?<br><span style="color:var(--teal);font-weight:600">Still early.</span><br><br>At some point<br>you won't be early anymore.</div><div style="font-size:12px;color:var(--slate)">Just saying. 👀</div></div></div>`},

{d:49,ph:'2',cap:`We showed Yuktha to multiple VCs this month.\n\nThe consistent response:\n"The problem is real."\n"The market is enormous."\n"The product is built."\n\nNow we execute.\n\nDay 49. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 49</div></div><div class="body" style="margin-top:14px"><div class="tag tp">INVESTOR CONVERSATIONS</div><div class="h3" style="margin-bottom:12px">We showed Yuktha to multiple VCs.</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px"><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The problem is real."</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The market is enormous."</div></div><div class="bl"><div style="font-size:11px;color:var(--slate2);font-style:italic">"The product is built."</div></div></div><div style="font-size:13px;font-weight:700;color:var(--teal)">Now we execute.</div></div></div>`},

{d:50,ph:'2',cap:`Day 50.\n\nHalfway.\n\nProduct built. Three portals working. AI in 22 languages. Emergency QR live. Zero external funding.\n\nStill going. Still building. The problem hasn't changed. Neither have we.\n\nHealth connected. Care protected.\n\n#Yuktha #Day50 #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 50</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">50</div><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:12px">days. Still building.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:11px;color:var(--slate);line-height:1.7">Zero external funding.<br>Product built. Three portals.<br>AI in 22 languages.<br>Emergency QR live.</div><div style="margin-top:12px;font-family:'Playfair Display',serif;font-size:16px;font-weight:900;font-style:italic;color:var(--teal)">Health connected. Care protected.</div></div></div>`},

{d:51,ph:'2',cap:`The people who discovered Yuktha early will tell the story of how they knew before it was everywhere.\n\nYou're one of those people.\n\n#Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 51</div></div><div style="text-align:center"><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">The people who discovered<br>Yuktha early<br>will tell the story of how<br>they knew before<br>it was everywhere.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:14px;font-weight:700;color:var(--teal)">You're one of those people.</div></div></div>`},

{d:52,ph:'2',cap:`Someone is going to build this for India's healthcare system.\n\nIt might as well be us.\n\nIt IS us.\n\nDay 52. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:300px;height:300px;background:rgba(139,92,246,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 52</div></div><div style="text-align:center"><div style="font-size:16px;color:var(--slate2);line-height:2;margin-bottom:14px">Someone is going to build this<br>for India's healthcare system.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">It might as well be us.</div><div style="font-size:20px;font-weight:700;color:var(--teal)">It IS us.</div></div></div>`},

{d:53,ph:'2',cap:`Day 18. We had a notebook and a problem.\nDay 31. We revealed the product.\nDay 53. Hospitals are asking us when they can go live.\n\nThis is what building in public feels like.\n\n#BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 53</div></div><div class="body" style="margin-top:14px"><div class="tag tc">THE JOURNEY SO FAR</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:8px"><div class="boxn"><div style="font-size:9px;color:var(--slate);margin-bottom:3px">DAY 1</div><div style="font-size:11px;color:var(--slate2)">A problem we couldn't stop thinking about</div></div><div class="boxn"><div style="font-size:9px;color:var(--slate);margin-bottom:3px">DAY 31</div><div style="font-size:11px;color:var(--slate2)">Revealed the product</div></div><div class="boxt"><div style="font-size:9px;color:var(--teal);margin-bottom:3px">DAY 53</div><div style="font-size:11px;color:var(--teal)">Hospitals asking when they can go live</div></div></div><div style="margin-top:12px;font-size:11px;color:var(--slate)">This is what building in public feels like.</div></div></div>`},

{d:54,ph:'2',cap:`Print your Yuktha QR card.\n\nKeep it in your wallet.\n\nYour phone can die. This card never will.\n\nYour backup emergency identity. Always on you.\n\n#Yuktha #EmergencyQR`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:260px;height:260px;background:rgba(2,182,154,.08);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 54</div></div><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">💳</div><div class="h2" style="margin-bottom:8px">Print your QR card.</div><div style="font-size:14px;color:var(--red);font-weight:600;margin-bottom:10px">Your phone can die.<br>This card never will.</div><div style="font-size:11px;color:var(--slate);line-height:1.6">Keep it in your wallet.<br>Your backup emergency identity.<br>Always on you.</div></div></div>`},

{d:55,ph:'2',cap:`Practo books appointments.\nABHA barely works on the ground.\nHMS software manages billing.\n\nNone of them answer:\nWhat happens when an unconscious patient arrives at a hospital that has never seen them before?\n\nWe're building the layer underneath that nobody has built yet.\n\n#Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 55</div></div><div class="body" style="margin-top:14px"><div class="tag tr">WHY NO ONE ELSE DOES THIS</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px"><div class="boxn"><div style="font-size:10px;color:var(--slate);margin-bottom:2px">Practo</div><div style="font-size:11px;color:var(--slate2)">Books appointments. That's it.</div></div><div class="boxn"><div style="font-size:10px;color:var(--slate);margin-bottom:2px">ABHA</div><div style="font-size:11px;color:var(--slate2)">Barely works on the ground.</div></div><div class="boxn"><div style="font-size:10px;color:var(--slate);margin-bottom:2px">HMS software</div><div style="font-size:11px;color:var(--slate2)">Manages billing. Internally.</div></div></div><div class="boxt"><div style="font-size:11px;color:var(--teal)">We're building the layer underneath that nobody has built yet.</div></div></div></div>`},

{d:56,ph:'2',cap:`Share this with someone who:\n\n• Has elderly parents\n• Has a chronic condition\n• Has never set up an emergency contact properly\n• Works in healthcare\n\nThey need to know Yuktha exists.\n\n👇 #Yuktha`,vis:`<div class="p" style="background:#020810"><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 56</div></div><div class="body" style="margin-top:14px"><div class="tag tc">SHARE THIS WITH SOMEONE WHO:</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:10px"><div class="boxt" style="display:flex;align-items:center;gap:8px"><span>👴</span><span style="font-size:11px;color:var(--slate2)">Has elderly parents</span></div><div class="boxt" style="display:flex;align-items:center;gap:8px"><span>💊</span><span style="font-size:11px;color:var(--slate2)">Has a chronic condition</span></div><div class="boxt" style="display:flex;align-items:center;gap:8px"><span>📱</span><span style="font-size:11px;color:var(--slate2)">Never set up an emergency contact properly</span></div><div class="boxt" style="display:flex;align-items:center;gap:8px"><span>🩺</span><span style="font-size:11px;color:var(--slate2)">Works in healthcare</span></div></div><div style="margin-top:12px;font-size:12px;color:var(--teal);font-weight:600">They need to know Yuktha exists. 👇</div></div></div>`},

{d:57,ph:'2',cap:`We shipped something at 2AM last night.\n\nNo one noticed.\n\nWe noticed.\n\nThat's enough.\n\nDay 57. #BuildingInPublic #Yuktha`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:260px;height:260px;background:rgba(2,182,154,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 57</div></div><div style="text-align:center"><div style="font-size:40px;margin-bottom:12px">💻</div><div style="font-size:14px;color:var(--slate2);line-height:2;margin-bottom:14px">Shipped a feature at 2AM.<br>No one noticed.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:16px;font-weight:700;color:var(--teal)">We noticed.</div><div style="font-size:12px;color:var(--slate);margin-top:6px">That's enough.</div></div></div>`},

{d:58,ph:'2',cap:`₹3,500.\n\nThat's what Yuktha costs a hospital per month.\n\nOne busy consultation day covers the entire month's subscription.\n\nEvery feature. Every portal. Every patient. Every doctor.\n\nStarting at ₹3,500.\n\n#Yuktha #HospitalOS`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:280px;height:280px;background:rgba(2,182,154,.09);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 58</div></div><div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:64px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:4px">₹3,500</div><div style="font-size:12px;color:#fff;margin-bottom:8px">per month per hospital</div><div style="font-size:11px;color:var(--slate);margin-bottom:12px">One consultation day covers the whole month.</div><div style="display:flex;flex-direction:column;gap:4px;text-align:left;max-width:180px;margin:0 auto"><div class="li"><div class="ld"></div><div class="lt">Every feature</div></div><div class="li"><div class="ld"></div><div class="lt">Every portal</div></div><div class="li"><div class="ld"></div><div class="lt">Unlimited patients</div></div></div></div></div>`},

{d:59,ph:'2',cap:`Not every door opens.\n\nThat's fine.\n\nEvery no is just navigation.\n\nWe know where we're going.\n\nDay 59. #BuildingInPublic #Yuktha #Resilience`,vis:`<div class="p" style="background:#020810;align-items:center;justify-content:center"><div class="gc" style="width:260px;height:260px;background:rgba(232,64,64,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row" style="position:absolute;top:24px;left:24px;right:24px"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 59</div></div><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">🚪</div><div style="font-size:16px;color:var(--slate2);line-height:2;margin-bottom:14px">Not every door opens.<br>That's fine.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 12px"></div><div style="font-size:15px;font-weight:700;color:var(--teal)">Every no is just navigation.</div><div style="font-size:12px;color:var(--slate);margin-top:8px">We know where we're going.</div></div></div>`},

{d:60,ph:'2',cap:`Day 60.\n\nTwo months.\n\nThe problem is the same.\nThe mission is the same.\nThe urgency is the same.\n\nBut Yuktha is bigger, sharper, and closer to launch than ever.\n\nStay close. Phase 3 starts soon.\n\n#Yuktha #BuildingInPublic`,vis:`<div class="p" style="background:#020810"><div class="gc" style="width:320px;height:320px;background:rgba(2,182,154,.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div><div class="logo-row"><div class="yl"><span>yuktha</span><span class="d">.</span></div><div class="db">DAY 60</div></div><div class="body" style="margin-top:14px;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:80px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:6px">60</div><div style="font-size:13px;color:#fff;margin-bottom:10px">Two months. Still building.</div><div style="height:2px;width:36px;background:var(--teal);margin:0 auto 10px"></div><div style="font-size:11px;color:var(--slate);line-height:1.7">Same problem. Same mission.<br>Same urgency.<br><span style="color:var(--teal);font-weight:600">Phase 3 starts soon.</span></div></div></div>`},
